<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pattern Scanner</title><style>

body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

video{
width:95%;
border:3px solid cyan;
margin-top:20px;
}

#result{
margin-top:20px;
font-size:22px;
color:yellow;
}

button{
padding:12px 30px;
font-size:18px;
margin-top:15px;
}

canvas{
display:none;
}

</style></head><body><h2>8 Bit Pattern Scanner</h2><video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<br><button onclick="startScanner()">Start Scanner</button>

<div id="result">Waiting...</div><script>

let targetPattern=""
const video=document.getElementById("video")
const canvas=document.getElementById("canvas")
const ctx=canvas.getContext("2d")

function startScanner(){

targetPattern=prompt("Enter 8 bit pattern (example 01010101)")

if(!targetPattern || targetPattern.length!=8){
alert("Enter exactly 8 bits")
return
}

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject=stream
video.onloadedmetadata=()=>{
scanLoop()
}
})

}

function scanLoop(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let frame=ctx.getImageData(0,0,canvas.width,canvas.height)
let data=frame.data

let red=0
let blue=0

for(let i=0;i<data.length;i+=4){

let r=data[i]
let g=data[i+1]
let b=data[i+2]

if(r>200 && g<80 && b<80) red++
if(b>200 && r<80 && g<80) blue++

}

let detected=""

if(red>1500) detected+="0"
if(blue>1500) detected+="1"

document.getElementById("result").innerText=
"Detected: "+detected+" | Target: "+targetPattern

if(detected===targetPattern){
alert("Done")
}

requestAnimationFrame(scanLoop)

}

</script></body>
</html>
