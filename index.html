<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>8 Bit Pattern Scanner</title><style>

body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

video{
width:92%;
border:3px solid cyan;
margin-top:20px;
}

button{
padding:12px 25px;
font-size:18px;
margin-top:15px;
}

#result{
margin-top:20px;
font-size:20px;
color:yellow;
}

</style></head><body><h2>Custom Pattern Scanner</h2><video id="camera" autoplay playsinline></video>

<br><button onclick="startScan()">Start Scan</button>

<div id="result">Waiting...</div><script>

let targetPattern=""

const video=document.getElementById("camera")

function startScan(){

targetPattern=prompt("Enter 8 bit pattern (example 01010101)")

if(!targetPattern || targetPattern.length!=8){
alert("Pattern must be 8 bits")
return
}

navigator.mediaDevices.getUserMedia({
video:{
facingMode:{exact:"environment"}
}
})
.then(stream=>{
video.srcObject=stream
scanLoop()
})
.catch(()=>{
alert("Back camera not available")
})

}

function scanLoop(){

let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let frame=ctx.getImageData(0,0,canvas.width,canvas.height)

let data=frame.data

let redCount=0
let blueCount=0

for(let i=0;i<data.length;i+=4){

let r=data[i]
let g=data[i+1]
let b=data[i+2]

if(r>200 && g<80 && b<80){
redCount++
}

if(b>200 && r<80 && g<80){
blueCount++
}

}

let pattern=""

if(redCount>1000) pattern+="0"
if(blueCount>1000) pattern+="1"

document.getElementById("result").innerText=
"Detected Pattern: "+pattern

if(pattern===targetPattern){
alert("Done")
}

requestAnimationFrame(scanLoop)

}

</script></body>
</html>
