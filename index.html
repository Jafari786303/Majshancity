<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Scanner</title>

<style>
body{
 background:#111;
 color:white;
 text-align:center;
 font-family:Arial;
}

video{
 width:300px;
 border:3px solid #0f0;
 border-radius:10px;
}

.container{
 position:relative;
 display:inline-block;
}

.guide-line{
 position:absolute;
 top:50%;
 left:5%;
 width:90%;
 height:3px;
 background:red;
 box-shadow:0 0 10px red;
}

.hidden{display:none;}

button{
 padding:8px;
 margin:5px;
}

input{
 padding:8px;
 margin:5px;
 width:200px;
}

table{
 margin:auto;
 border-collapse:collapse;
}

td,th{
 border:1px solid white;
 padding:5px;
}
</style>

</head>

<body>

<h2>Secure Scanner</h2>

<div id="loginBox">
 <input id="loginName" placeholder="Enter Name"><br>
 <button onclick="login()">Login</button>
</div>

<div id="pinBox" class="hidden">
 <h3>Enter PIN</h3>
 <input id="pinInput" type="password"><br>
 <button onclick="checkPin()">Submit</button>
</div>

<div id="scannerBox" class="hidden">
 <div class="container">
  <video id="video" autoplay playsinline></video>
  <div class="guide-line"></div>
 </div>
</div>

<p id="status">Waiting...</p>

<canvas id="canvas" class="hidden"></canvas>

<div id="userPanel" class="hidden">
 <h3>User Details</h3>
 <p id="details"></p>
 <button onclick="logout()">Logout</button>
</div>

<div id="adminPanel" class="hidden">
 <h3>Admin Panel</h3>

 <input id="name" placeholder="Name"><br>
 <input id="job" placeholder="Job"><br>
 <input id="cnic" placeholder="CNIC"><br>
 <input id="card" placeholder="Card"><br>
 <input id="national" placeholder="National"><br>
 <input id="pattern" placeholder="Pattern"><br>
 <input id="pin" placeholder="PIN"><br>
 <input id="balance" placeholder="Balance"><br>

 <button onclick="saveUser()">Save</button>

 <h4>Accounts</h4>
 <table id="table"></table>

 <button onclick="logout()">Logout</button>
</div>

<script>

let users = JSON.parse(localStorage.getItem("users") || "[]");

let video = document.getElementById("video");
let stream;
let scanning=false;
let currentUser=null;
let lastPatterns=[];
let editingIndex=-1;

// LOGIN
function login(){
 let name = loginName.value;

 currentUser = users.find(u=>u.name===name);

 if(!currentUser){
  alert("User not found");
  return;
 }

 startCam();
}

// CAMERA FIX (BACK CAMERA)
function startCam(){
 navigator.mediaDevices.getUserMedia({
  video:{ facingMode:{ideal:"environment"} }
 })
 .then(s=>{
  stream=s;
  video.srcObject=s;
  scannerBox.classList.remove("hidden");
  scanning=true;
  scanLoop();
 });
}

function stopCam(){
 if(stream){
  stream.getTracks().forEach(t=>t.stop());
 }
 scanning=false;
}

// SCAN LOOP
function scanLoop(){
 if(!scanning) return;

 let canvas=document.getElementById("canvas");
 let ctx=canvas.getContext("2d");

 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;

 ctx.drawImage(video,0,0);

 let y=canvas.height/2;
 let step=canvas.width/8;

 let pattern="";

 for(let i=0;i<8;i++){
  let d=ctx.getImageData(i*step,y,1,1).data;
  let r=d[0],g=d[1],b=d[2];

  let brightness=(r+g+b)/3;

  pattern += brightness > 130 ? "1" : "0";
 }

 // SHOW PATTERN
 status.innerText="Pattern: "+pattern;

 // STABILITY CHECK
 lastPatterns.push(pattern);
 if(lastPatterns.length>5) lastPatterns.shift();

 let stable = lastPatterns.every(p=>p===pattern);

 if(stable){

  let match = users.find(u=>{
   let diff=0;

   for(let i=0;i<u.pattern.length;i++){
    if(u.pattern[i]!==pattern[i]) diff++;
   }

   return diff<=2;
  });

  if(match){
   stopCam();
   currentUser=match;
   pinBox.classList.remove("hidden");
  }
 }

 requestAnimationFrame(scanLoop);
}

// PIN CHECK
function checkPin(){
 if(currentUser && pinInput.value==currentUser.pin){
  pinBox.classList.add("hidden");

  if(currentUser.name==="admin"){
   showAdmin();
  }else{
   showUser();
  }
 }else{
  alert("Wrong PIN");
 }
}

// USER PANEL
function showUser(){
 userPanel.classList.remove("hidden");

 details.innerHTML=`
 Name: ${currentUser.name}<br>
 Job: ${currentUser.job}<br>
 CNIC: ${currentUser.cnic}<br>
 Card: ${currentUser.card}<br>
 National: ${currentUser.national}<br>
 Balance: ${currentUser.balance}
 `;
}

// ADMIN PANEL
function showAdmin(){
 adminPanel.classList.remove("hidden");
 showTable();
}

// TABLE
function showTable(){
 let t=document.getElementById("table");

 t.innerHTML=`
 <tr>
  <th>Name</th>
  <th>Job</th>
  <th>CNIC</th>
  <th>Card</th>
  <th>National</th>
  <th>PIN</th>
  <th>Action</th>
 </tr>
 `;

 users.forEach((u,i)=>{
  t.innerHTML+=`
  <tr>
   <td>${u.name}</td>
   <td>${u.job}</td>
   <td>${u.cnic}</td>
   <td>${u.card}</td>
   <td>${u.national}</td>
   <td>${u.pin}</td>
   <td><button onclick="editUser(${i})">Edit</button></td>
  </tr>
  `;
 });
}

// SAVE USER
function saveUser(){

 let u={
  name:name.value,
  job:job.value,
  cnic:cnic.value,
  card:card.value,
  national:national.value,
  pattern:pattern.value,
  pin:pin.value,
  balance:balance.value
 };

 if(editingIndex>=0){
  users[editingIndex]=u;
  editingIndex=-1;
 }else{
  users.push(u);
 }

 localStorage.setItem("users",JSON.stringify(users));
 showTable();
 alert("Saved");
}

// EDIT
function editUser(i){
 let u=users[i];

 name.value=u.name;
 job.value=u.job;
 cnic.value=u.cnic;
 card.value=u.card;
 national.value=u.national;
 pattern.value=u.pattern;
 pin.value=u.pin;
 balance.value=u.balance;

 editingIndex=i;
}

// LOGOUT
function logout(){
 location.reload();
}

</script>

</body>
</html>
