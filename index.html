<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Scanner Bank</title>
<style>
body{
 margin:0;
 font-family:Arial;
 background:#0b1220;
 color:white;
}.header{ background:#1e293b; padding:15px; text-align:center; font-weight:bold; font-size:20px; }

.container{ padding:15px; }

.card{ background:linear-gradient(135deg,#1d4ed8,#06b6d4); padding:20px; border-radius:20px; margin-top:15px; box-shadow:0 10px 25px rgba(0,0,0,0.4); }

input{ width:100%; padding:12px; margin-top:10px; border-radius:10px; border:none; outline:none; }

button{ width:100%; padding:12px; margin-top:10px; border:none; border-radius:10px; background:#22c55e; color:white; font-weight:bold; }

button.secondary{ background:#334155; }

button.danger{ background:#ef4444; }

.hidden{display:none}

.balance{ font-size:22px; font-weight:bold; margin-top:10px; }

.transfer-box{ background:#111827; padding:15px; border-radius:15px; margin-top:15px; }

</style>
</head>
<body><div class="header">💳 Smart Banking App</div><div class="container"><div id="loginBox">
 <input type="password" id="password" placeholder="Enter PIN">
 <button onclick="login()">Login</button>
</div><div id="app" class="hidden"> <div class="card" id="userCard"></div> <div class="transfer-box">
  <h3>Transfer Money</h3>
  <input id="toCard" placeholder="Receiver Card Number">
  <input id="amount" type="number" placeholder="Amount">
  <button onclick="transfer()">Send Money</button>
 </div><button class="secondary" onclick="logout()">Logout</button>

</div></div><canvas id="canvas" class="hidden"></canvas>

<script>

let db
let current=null

let req=indexedDB.open("ShapeBankDB",1)

req.onupgradeneeded=e=>{
 db=e.target.result
 let s=db.createObjectStore("accounts",{keyPath:"card"})

 s.add({name:"Bank Minister",job:"Minister",balance:999999999,card:"9999",password:"9999",pattern:"11111111",transactions:[]})
 s.add({name:"Hassan Abbas",job:"Teacher",balance:10000,card:"4444",password:"4444",pattern:"10101010",transactions:[]})
 s.add({name:"Hussain Abbas",job:"Engineer",balance:7000,card:"5555",password:"5555",pattern:"10100101",transactions:[]})
 s.add({name:"Muhammad",job:"Student",balance:5000,card:"7777",password:"1234",pattern:"10101010",transactions:[]})
}

req.onsuccess=e=>db=e.target.result

function login(){
 let pass=document.getElementById("password").value

 let tx=db.transaction("accounts","readonly")
 let store=tx.objectStore("accounts")

 store.openCursor().onsuccess=e=>{
  let c=e.target.result
  if(c){
   let a=c.value
   if(a.password===pass){
    current=a
    showApp()
   }
   c.continue()
  }
 }
}

function showApp(){
 document.getElementById("loginBox").classList.add("hidden")
 document.getElementById("app").classList.remove("hidden")
 updateUI()
}

function updateUI(){
 document.getElementById("userCard").innerHTML=`
 Name: ${current.name}<br>
 Job: ${current.job}<br>
 <div class="balance">Balance: ${current.balance}</div>
 Card: ${current.card}
 `
}

function transfer(){
 let amt=parseInt(document.getElementById("amount").value)
 let toCard=document.getElementById("toCard").value

 if(!amt || !toCard){alert("Enter details");return}
 if(current.balance<amt){alert("Insufficient balance");return}

 let tx=db.transaction("accounts","readwrite")
 let store=tx.objectStore("accounts")

 let req=store.get(toCard)

 req.onsuccess=e=>{
  let receiver=e.target.result
  if(!receiver){alert("Receiver not found");return}

  current.balance-=amt
  receiver.balance+=amt

  store.put(current)
  store.put(receiver)

  updateUI()
  alert("Transfer Successful")
 }
}

function logout(){
 location.reload()
}

</script></body>
</html>
