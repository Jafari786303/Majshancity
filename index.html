<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>8 Bit Scanner</title><style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

video{
width:95%;
margin-top:20px;
border:3px solid cyan;
}

#panel{
margin-top:20px;
font-size:22px;
}

button{
padding:12px 30px;
font-size:18px;
margin-top:15px;
}

canvas{
display:none;
}

</style></head><body><h2>8 Bit Pattern Scanner</h2><video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<br>
<button onclick="start()">Start Scan</button><div id="panel">
Target: -
<br>
Scanning: -
</div><script>

let target=""
let video=document.getElementById("video")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

function start(){

target=prompt("Enter 8 bit pattern example: 01010101")

if(!target || target.length!=8){
alert("Pattern must be 8 bits")
return
}

document.getElementById("panel").innerHTML=
"Target: "+target+"<br>Scanning: starting..."

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject=stream
video.onloadedmetadata=()=>{
scan()
}
})

}

function scan(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let img=ctx.getImageData(0,0,canvas.width,canvas.height)
let data=img.data

let sectionWidth=canvas.width/8
let pattern=""

for(let s=0;s<8;s++){

let red=0
let blue=0

let startX=Math.floor(s*sectionWidth)
let endX=Math.floor((s+1)*sectionWidth)

for(let y=0;y<canvas.height;y+=10){
for(let x=startX;x<endX;x+=10){

let i=(y*canvas.width+x)*4

let r=data[i]
let g=data[i+1]
let b=data[i+2]

if(r>200 && g<80 && b<80) red++
if(b>200 && r<80 && g<80) blue++

}
}

if(red>blue && red>20){
pattern+="0"
}
else if(blue>red && blue>20){
pattern+="1"
}
else{
pattern+="-"
}

}

document.getElementById("panel").innerHTML=
"Target: "+target+"<br>Scanning: "+pattern

if(pattern===target){
alert("Done")
}

requestAnimationFrame(scan)

}

</script></body>
</html>
