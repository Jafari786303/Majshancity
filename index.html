<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Easy Scanner Bank</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;text-align:center}

video{
width:92%;
max-width:420px;
border-radius:12px;
margin-top:10px
}

.overlay{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
justify-content:space-around;
align-items:center;
pointer-events:none;
}

.box{
width:30px;
height:30px;
border:2px solid yellow;
border-radius:50%;
}

input,button{
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
width:80%
}

.card{
background:linear-gradient(135deg,#2563eb,#06b6d4);
padding:15px;
border-radius:15px;
margin-top:10px;
width:90%;
max-width:380px;
margin:auto;
text-align:left
}

.hidden{display:none}
</style>
</head>

<body>

<h2>Easy Auto Scanner Bank</h2>

<div style="position:relative;display:inline-block">

<video id="video" autoplay playsinline></video>

<div class="overlay" id="overlay"></div>

</div>

<div id="livebits">Pattern: --------</div>

<input type="password" id="password" placeholder="PIN">

<div id="account" class="hidden">
<div class="card" id="card"></div>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>

/* create visual guide */
let overlay=document.getElementById("overlay")
for(let i=0;i<8;i++){
let b=document.createElement("div")
b.className="box"
overlay.appendChild(b)
}

let video=document.getElementById("video")
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>video.srcObject=s)

/* DB */
let db
let req=indexedDB.open("MiniBankDB6",1)

req.onupgradeneeded=e=>{
db=e.target.result
let s=db.createObjectStore("accounts",{keyPath:"card"})

s.add({name:"Bank Minister",job:"Minister",balance:999999999,card:"9999",password:"9999",pattern:"11111111",unlimited:true})
s.add({name:"Hassan Abbas",job:"Teacher",balance:10000,card:"4444",password:"4444",pattern:"11000011"})
s.add({name:"Hussain Abbas",job:"Engineer",balance:7000,card:"5555",password:"5555",pattern:"10100101"})
}

req.onsuccess=e=>db=e.target.result

let current=null

/* SMART EASY SCANNER */

let stable=[]
let last=""

function scan(){

if(video.videoWidth===0) return

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let y=canvas.height/2
let step=canvas.width/8

let bits=""

/* dynamic threshold */
let base=0
for(let i=0;i<8;i++){
let x=i*step+step/2
let d=ctx.getImageData(x,y,1,1).data
base+=(d[0]+d[1]+d[2])/3
}
let threshold=(base/8)

for(let i=0;i<8;i++){

let x=i*step+step/2

let sum=0

/* BIG AREA sampling */
for(let dx=-5;dx<=5;dx++){
for(let dy=-5;dy<=5;dy++){
let d=ctx.getImageData(x+dx,y+dy,1,1).data
sum+=(d[0]+d[1]+d[2])/3
}
}

let avg=sum/121

if(avg<threshold) bits+="1"
else bits+="0"
}

/* stability */
stable.push(bits)
if(stable.length>3) stable.shift()

let ok=stable.every(v=>v===bits)

document.getElementById("livebits").innerText="Pattern: "+bits

if(ok && bits!==last){
login(bits)
last=bits
}
}

setInterval(scan,100)

/* LOGIN */

function login(p){

let pass=document.getElementById("password").value
if(!pass) return

let tx=db.transaction("accounts","readonly")
let store=tx.objectStore("accounts")

store.openCursor().onsuccess=e=>{
let c=e.target.result

if(c){

let a=c.value

if(a.pattern===p && a.password===pass){

current=a
document.getElementById("account").classList.remove("hidden")

document.getElementById("card").innerHTML=`
Name: ${a.name}<br>
Job: ${a.job}<br>
Balance: ${a.unlimited?"Unlimited":a.balance}
`
}

c.continue()
}
}
}

</script>

</body>
</html>
