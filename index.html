<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MJ City Bank</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f2f1f;
color:white;
text-align:center;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

button{
padding:12px;
margin:8px;
border:none;
border-radius:10px;
background:#2ecc71;
color:white;
font-size:16px;
}

input{
padding:10px;
margin:6px;
border-radius:8px;
border:none;
width:80%;
}

#scannerBox{
width:200px;
height:200px;
border:4px solid #2ecc71;
margin:auto;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

</style>
</head>

<body>

<!-- HOME PAGE -->

<div id="home" class="page active">

<h1>MJ City Bank</h1>

<p>Education • City Development • Secure Banking</p>

<button onclick="openLogin()">Scan Card</button>

</div>


<!-- SCANNER PAGE -->

<div id="scanner" class="page">

<h2>Card Scanner</h2>

<input id="loginCard" placeholder="Enter Card Number">

<br>

<button onclick="startScanner()">Start Scan</button>

<div id="scannerBox">00000000</div>

<p id="scanResult">Reading : </p>

<button onclick="goHome()">Back</button>

</div>


<!-- ACCOUNT PAGE -->

<div id="account" class="page">

<h2 id="accName"></h2>

<p id="accJob"></p>

<p id="accCL"></p>

<p id="accCard"></p>

<p id="accNational"></p>

<p id="accBalance"></p>

<button onclick="goHome()">Logout</button>

</div>



<script>

let accounts={

"1001":{
name:"Ali Khan",
job:"Teacher",
cl:"A",
card:"1001",
national:"35201",
balance:50000,
pattern:"10101010"
},

"1002":{
name:"Hassan Abbas",
job:"Engineer",
cl:"B",
card:"1002",
national:"35202",
balance:60000,
pattern:"11001100"
},

"1003":{
name:"Hussain Abbas",
job:"Doctor",
cl:"A",
card:"1003",
national:"35203",
balance:70000,
pattern:"11110000"
}

}

function show(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

function openLogin(){

show("scanner")

}

function goHome(){

show("home")

}

function loginAccount(card){

let a=accounts[card]

if(!a)return

accName.innerText="Name : "+a.name
accJob.innerText="Job : "+a.job
accCL.innerText="CL : "+a.cl
accCard.innerText="Card No : "+a.card
accNational.innerText="National No : "+a.national
accBalance.innerText="Balance : "+a.balance

show("account")

}

let scanning=false
let scanTimer=null

function startScanner(){

let card=loginCard.value

if(!accounts[card]){
alert("Card not found")
return
}

scanning=true

clearInterval(scanTimer)

scanTimer=setInterval(scanCenter,120)

}

function scanCenter(){

if(!scanning)return

let card=loginCard.value

if(!accounts[card])return

let reading=""

for(let i=0;i<8;i++){

reading+=Math.random()>0.5?"1":"0"

}

scannerBox.innerText=reading
scanResult.innerText="Reading : "+reading

if(reading===accounts[card].pattern){

scanning=false
clearInterval(scanTimer)

loginAccount(card)

}

}

</script>

</body>
</html>
