<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Bank Scanner Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(#0f5132,#198754);
color:white;
text-align:center;
}

h1{
margin-top:20px;
}

input{
width:80%;
padding:12px;
border-radius:8px;
border:none;
margin-top:10px;
font-size:18px;
}

button{
width:80%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#20c997;
font-size:18px;
color:white;
}

#videoContainer{
position:relative;
width:90%;
margin:auto;
margin-top:15px;
}

video{
width:100%;
border-radius:12px;
}

#scanBox{
position:absolute;
left:50%;
top:50%;
transform:translate(-50%,-50%);
width:280px;
height:70px;
border:4px solid #00ffae;
border-radius:12px;
box-shadow:0 0 10px #00ffae;
}

.grid{
position:absolute;
top:0;
bottom:0;
width:1px;
background:#00ffae;
}

#line{
position:absolute;
top:50%;
left:0;
right:0;
height:3px;
background:red;
}

#reading{
font-size:20px;
margin-top:10px;
}

</style>
</head>

<body>

<h1>Login</h1>

<input id="loginCard" placeholder="Card Number">

<button onclick="startScanner()">Start Scanner</button>

<div id="videoContainer">

<video id="camera" autoplay playsinline></video>

<div id="scanBox">

<div id="line"></div>

<div class="grid" style="left:12.5%"></div>
<div class="grid" style="left:25%"></div>
<div class="grid" style="left:37.5%"></div>
<div class="grid" style="left:50%"></div>
<div class="grid" style="left:62.5%"></div>
<div class="grid" style="left:75%"></div>
<div class="grid" style="left:87.5%"></div>

</div>

</div>

<div id="reading">Reading : --------</div>

<canvas id="canvas" style="display:none"></canvas>

<script>

let camera=document.getElementById("camera")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

let scanTimer
let scanning=false

let accounts={
"5555":{
name:"Majshan",
balance:5000,
pattern:"10110101"
}
}

function startScanner(){

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(function(stream){

camera.srcObject=stream

camera.onloadedmetadata=function(){

scanning=true

scanTimer=setInterval(scanCenter,150)

}

})

}

function scanCenter(){

if(!scanning) return

canvas.width=camera.videoWidth
canvas.height=camera.videoHeight

ctx.drawImage(camera,0,0)

let startX=canvas.width/2-140
let centerY=canvas.height/2

let reading=""

for(let i=0;i<8;i++){

let x=startX+i*35+8
let y=centerY-10

let data=ctx.getImageData(x,y,20,20).data

let total=0

for(let p=0;p<data.length;p+=4){

let brightness=(data[p]+data[p+1]+data[p+2])/3

total+=brightness

}

let avg=total/(data.length/4)

if(avg<140){

reading+="1"

}else{

reading+="0"

}

}

document.getElementById("reading").innerText="Reading : "+reading

let card=document.getElementById("loginCard").value

if(accounts[card] && reading===accounts[card].pattern){

scanning=false
clearInterval(scanTimer)

alert("Login Successful\nWelcome "+accounts[card].name)

}

}

</script>

</body>
</html>
