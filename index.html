<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Bank</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f172a;
 color:white;
 text-align:center;
}

.container{ padding:15px; }

video{
 width:90%;
 border-radius:10px;
 margin-top:10px;
 background:black;
}

button{
 padding:10px;
 margin:5px;
 border:none;
 border-radius:8px;
 background:#3b82f6;
 color:white;
}

.card{
 background:#1e293b;
 padding:15px;
 margin:10px;
 border-radius:10px;
}

input{
 padding:8px;
 margin:5px;
 width:80%;
 border-radius:6px;
 border:none;
}

.hidden{ display:none; }
</style>
</head>

<body>

<div class="container">

<h2>Secure Banking System</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" class="hidden"></canvas>

<br>
<button onclick="startCam()">Start Camera</button>

<p id="patternText"></p>

<div id="loginArea" class="card hidden">
<h3>Enter PIN</h3>
<input type="password" id="pinInput">
<br>
<button onclick="verifyPin()">Verify</button>
</div>

<div id="dashboard" class="hidden">

<h3 id="userName"></h3>
<p id="balance"></p>

<div class="card">
<h3>Transfer Money</h3>
<input id="toUser" placeholder="Recipient Name">
<input id="amount" placeholder="Amount">
<br>
<button onclick="transfer()">Send</button>
</div>

<div class="card">
<h3>Change PIN</h3>
<input id="newPin" placeholder="New PIN">
<br>
<button onclick="changePin()">Update PIN</button>
</div>

</div>

</div>

<script>

let video, currentUser=null, currentPattern="";
let history=[];

// LOAD USERS FROM STORAGE OR CREATE
let users = JSON.parse(localStorage.getItem("users"));

if(!users){
 users=[
  {name:"Muhammad",pattern:"10100101",pin:"1234",balance:5000},
  {name:"Hassan",pattern:"11001100",pin:"2222",balance:8000},
  {name:"Hussain",pattern:"00110011",pin:"3333",balance:12000}
 ];
 localStorage.setItem("users",JSON.stringify(users));
}

// INIT
window.onload=function(){
 video=document.getElementById("video");
}

// START CAMERA
function startCam(){
 navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
 })
 .then(stream=>{
  video.srcObject=stream;
  startScan();
 })
 .catch(()=>alert("Camera error"));
}

// AUTO SCAN
function startScan(){
 function loop(){
  scan();
  requestAnimationFrame(loop);
 }
 loop();
}

// SCANNER
function scan(){
 if(video.videoWidth===0) return;

 let canvas=document.getElementById("canvas");
 let ctx=canvas.getContext("2d");

 canvas.width=video.videoWidth;
 canvas.height=video.videoHeight;

 ctx.drawImage(video,0,0);

 let y=canvas.height/2;
 let step=canvas.width/8;

 let bits="";

 for(let i=0;i<8;i++){
  let x=i*step+step/2;

  let blue=0, red=0;

  for(let dx=-3;dx<=3;dx++){
   for(let dy=-3;dy<=3;dy++){

    let d=ctx.getImageData(x+dx,y+dy,1,1).data;
    let r=d[0],g=d[1],b=d[2];

    if(r>150 && r>g+30 && r>b+30) red++;
    if(b>130 && b>r+20) blue++;

   }
  }

  bits += blue>red ? "1" : "0";
 }

 history.push(bits);
 if(history.length>5) history.shift();

 document.getElementById("patternText").innerText=bits;

 let stable = history.length===5 && history.every(v=>v===bits);

 if(stable){
  matchPattern(bits);
 }
}

// MATCH PATTERN
function matchPattern(p){

 let user=users.find(u=>u.pattern===p);

 if(user){
  currentUser=user;

  document.getElementById("loginArea").classList.remove("hidden");

 }else{
  document.getElementById("loginArea").classList.add("hidden");
  document.getElementById("dashboard").classList.add("hidden");
 }
}

// PIN VERIFY
function verifyPin(){

 let pin=document.getElementById("pinInput").value;

 if(currentUser && pin===currentUser.pin){

  document.getElementById("loginArea").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("userName").innerText=currentUser.name;
  document.getElementById("balance").innerText="Balance: "+currentUser.balance;

 }else{
  alert("Wrong PIN");
 }
}

// TRANSFER
function transfer(){

 let to=document.getElementById("toUser").value;
 let amt=parseFloat(document.getElementById("amount").value);

 let receiver=users.find(u=>u.name.toLowerCase()===to.toLowerCase());

 if(receiver && amt>0 && currentUser.balance>=amt){

  currentUser.balance -= amt;
  receiver.balance += amt;

  save();

  document.getElementById("balance").innerText="Balance: "+currentUser.balance;

  alert("Transfer Successful");

 }else{
  alert("Invalid Transfer");
 }
}

// CHANGE PIN
function changePin(){

 let newPin=document.getElementById("newPin").value;

 if(newPin.length>=4){
  currentUser.pin=newPin;
  save();
  alert("PIN Updated");
 }else{
  alert("PIN too short");
 }
}

// SAVE DATA
function save(){
 localStorage.setItem("users",JSON.stringify(users));
}

</script>

</body>
</html>
