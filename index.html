<!DOCTYPE html>
<html>
<head>
<title>Majshan Bank</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}

body{
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

/* HEADER */
.header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:15px 30px;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(20px);
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:40px;height:40px;border-radius:10px;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:90vh;
}

/* GLASS CARD */
.card{
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius:20px;
    padding:30px;
    width:320px;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
    text-align:center;
}

input,button{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:10px;
}

button{
    background:linear-gradient(45deg,#22c55e,#4ade80);
    color:white;
    cursor:pointer;
}

.link{color:#38bdf8;cursor:pointer;margin-top:10px;}

/* PANELS */
#dashboard,#admin{display:none;padding:20px;}

.box{
    background:rgba(255,255,255,0.05);
    padding:15px;
    border-radius:15px;
    margin:10px 0;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img id="bankLogo" src="">
        <h2>Majshan Bank</h2>
    </div>
    <button onclick="logout()">Logout</button>
</div>

<div class="container">

<!-- LOGIN -->
<div class="card" id="loginBox">
<h2>Login</h2>
<input id="loginCard" placeholder="Card Number">
<input id="loginPin" type="password" placeholder="PIN">
<button onclick="login()">Login</button>
<button onclick="googleLogin()">Google Login</button>
<div class="link" onclick="showSignup()">Create Account</div>
</div>

<!-- SIGNUP -->
<div class="card" id="signupBox" style="display:none;">
<h2>Signup</h2>
<input id="sName" placeholder="Name">
<input id="sPin" placeholder="PIN">
<button onclick="createAccount()">Create</button>
<div class="link" onclick="showLogin()">Back</div>
</div>

</div>

<!-- DASHBOARD -->
<div id="dashboard">
<h2>Dashboard</h2>

<div class="box">
<img id="profile" width="80"><br>
<p id="name"></p>
<p>Balance: <span id="balance"></span></p>
</div>

<div class="box">
<h3>Send Money</h3>
<input id="toCard" placeholder="Receiver Card">
<input id="amount" placeholder="Amount">
<button onclick="sendMoney()">Send</button>
</div>

<div class="box">
<h3>Message</h3>
<input id="msg" placeholder="Message">
<button onclick="sendMessage()">Send</button>
</div>

<button onclick="linkGoogle()">Link Google</button>
</div>

<!-- ADMIN -->
<div id="admin">
<h2>Admin Panel</h2>

<div class="box">
<h3>Create Account</h3>
<input id="aName" placeholder="Name">
<input id="aPin" placeholder="PIN">
<button onclick="createAccount()">Create</button>
</div>

<div class="box">
<h3>Set Bank Logo</h3>
<input id="logoUrl" placeholder="Enter Logo URL">
<button onclick="setLogo()">Update Logo</button>
</div>

<div id="users"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getFirestore,collection,doc,getDoc,getDocs,setDoc,updateDoc } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { getAuth,GoogleAuthProvider,signInWithPopup } 
from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";

const app=initializeApp({
apiKey:"AIzaSyCbho9Xz750QHAGzvQK2H0ymZyXEvVvhZs",
authDomain:"mathsappdb-ea7d8.firebaseapp.com",
projectId:"mathsappdb-ea7d8"
});

const db=getFirestore(app);
const auth=getAuth();
const provider=new GoogleAuthProvider();

/* LOAD LOGO */
async function loadLogo(){
    const ref=doc(db,"settings","branding");
    const snap=await getDoc(ref);
    if(snap.exists()){
        bankLogo.src=snap.data().logo;
    }else{
        bankLogo.src="https://via.placeholder.com/40";
    }
}
loadLogo();

/* SET LOGO */
window.setLogo=async()=>{
    await setDoc(doc(db,"settings","branding"),{
        logo:logoUrl.value
    });
    loadLogo();
};

/* UI SWITCH */
window.showSignup=()=>{loginBox.style.display="none";signupBox.style.display="block";}
window.showLogin=()=>{signupBox.style.display="none";loginBox.style.display="block";}

/* LOGIN */
window.login=async()=>{
let snap=await getDocs(collection(db,"accounts"));
let found=null;
snap.forEach(d=>{
let x=d.data();
if(x.card==loginCard.value && x.pin==loginPin.value){found=d;}
});
if(!found){alert("Invalid");return;}
localStorage.setItem("user",found.id);
found.data().role=="admin"?loadAdmin():loadUser();
};

/* GOOGLE LOGIN */
window.googleLogin=async()=>{
let res=await signInWithPopup(auth,provider);
let snap=await getDocs(collection(db,"accounts"));
snap.forEach(d=>{
if(d.data().googleUid==res.user.uid){
localStorage.setItem("user",d.id);
loadUser();
}
});
};

/* CREATE ACCOUNT */
window.createAccount=async()=>{
let name=aName?.value||sName.value;
let pin=aPin?.value||sPin.value;

let card="";
for(let i=0;i<16;i++){card+=Math.floor(Math.random()*10);}

await setDoc(doc(collection(db,"accounts")),{
name,pin,card,role:"user",balance:0,
photo:"https://via.placeholder.com/100",
googleUid:null
});
alert("Card: "+card);
};

/* LOAD USER */
async function loadUser(){
loginBox.style.display="none";
signupBox.style.display="none";
dashboard.style.display="block";

let snap=await getDoc(doc(db,"accounts",localStorage.getItem("user")));
let d=snap.data();
name.innerText=d.name;
balance.innerText=d.balance;
profile.src=d.photo;
}

/* ADMIN */
async function loadAdmin(){
loginBox.style.display="none";
admin.style.display="block";

let snap=await getDocs(collection(db,"accounts"));
users.innerHTML="";
snap.forEach(d=>{
let x=d.data();
users.innerHTML+=`
<div class="box">
${x.name} | ${x.balance}
<button onclick="edit('${d.id}')">Edit</button>
</div>`;
});
}

window.edit=async(id)=>{
let val=prompt("Balance:");
await updateDoc(doc(db,"accounts",id),{balance:+val});
loadAdmin();
};

/* SEND MONEY */
window.sendMoney=async()=>{
let all=await getDocs(collection(db,"accounts"));
let receiver=null;

all.forEach(d=>{
if(d.data().card==toCard.value){receiver=d;}
});

if(!receiver){alert("Not found");return;}

let senderRef=doc(db,"accounts",localStorage.getItem("user"));
let sender=(await getDoc(senderRef)).data();
let rec=receiver.data();

if(sender.role!="minister" && sender.balance<amount.value){alert("Low");return;}

if(sender.role!="minister"){sender.balance-=+amount.value;}
rec.balance+=+amount.value;

await updateDoc(senderRef,{balance:sender.balance});
await updateDoc(doc(db,"accounts",receiver.id),{balance:rec.balance});

loadUser();
};

/* MESSAGE */
window.sendMessage=async()=>{
await setDoc(doc(collection(db,"messages")),{
msg:msg.value,user:localStorage.getItem("user")
});
alert("Sent");
};

/* LINK GOOGLE */
window.linkGoogle=async()=>{
let res=await signInWithPopup(auth,provider);
await updateDoc(doc(db,"accounts",localStorage.getItem("user")),{
googleUid:res.user.uid
});
alert("Linked");
};

/* LOGOUT */
window.logout=()=>{localStorage.clear();location.reload();}

/* AUTO LOGIN */
let u=localStorage.getItem("user");
if(u){
let s=await getDoc(doc(db,"accounts",u));
s.data().role=="admin"?loadAdmin():loadUser();
}
</script>

</body>
</html>
