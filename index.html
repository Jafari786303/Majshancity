<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>8 Bit Shape Scanner</title><style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
margin:0;
}

video{
width:95%;
margin-top:20px;
border:3px solid cyan;
}

#panel{
margin-top:20px;
font-size:20px;
}

button{
padding:12px 30px;
font-size:18px;
margin-top:15px;
}

canvas{
display:none;
}

</style></head><body><h2>8-Bit Pattern Scanner</h2><video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<br>
<button onclick="start()">Start Scan</button><div id="panel">
Target: -
<br>
Scanning: -
</div><script>

let target=""
let video=document.getElementById("video")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

function start(){

target=prompt("Enter 8 bit pattern (example 01010101)")

if(!target || target.length!=8){
alert("Pattern must be 8 bits")
return
}

document.getElementById("panel").innerHTML=
"Target: "+target+"<br>Scanning: ..."

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject=stream
video.onloadedmetadata=()=>{
scan()
}
})

}

function scan(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let img=ctx.getImageData(0,0,canvas.width,canvas.height)
let data=img.data

let red=0
let blue=0

for(let i=0;i<data.length;i+=4){

let r=data[i]
let g=data[i+1]
let b=data[i+2]

if(r>200 && g<80 && b<80) red++
if(b>200 && r<80 && g<80) blue++

}

let pattern=""

if(red>2000) pattern+="0"
if(blue>2000) pattern+="1"

document.getElementById("panel").innerHTML=
"Target: "+target+"<br>Scanning: "+pattern

if(pattern===target){
alert("Done")
}

requestAnimationFrame(scan)

}

</script></body>
</html>
