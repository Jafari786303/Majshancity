<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Scanner</title>
<style>
body{
 font-family:Arial;
 text-align:center;
 background:#111;
 color:#fff;
}

video{
 width:90%;
 border:3px solid #fff;
 margin-top:10px;
}

button{
 padding:10px;
 margin:5px;
 font-size:16px;
}
</style>
</head>

<body>

<h2>Bank Scanner</h2>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<br>
<button onclick="start()">Start Camera</button>
<button onclick="scan()">Scan</button>

<p id="livebits">Pattern: </p>

<!-- Admin -->
<br><br>
<input type="password" id="adminPass" placeholder="Admin password">
<button onclick="adminLogin()">Admin</button>

<pre id="adminPanel"></pre>

<script>

let video=document.getElementById("video")
let stream=null

let history=[]
let last=""

// USERS DATABASE
let users=[
{
 name:"Muhammad",
 pattern:"10100101",
 balance:5000
},
{
 name:"Hassan",
 pattern:"11001100",
 balance:8000
},
{
 name:"Hussain",
 pattern:"00110011",
 balance:12000
}
]

let adminPassword="mjgogog786"

// START CAMERA (BACK CAMERA)
function start(){
 navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
 })
 .then(s=>{
  stream=s
  video.srcObject=s
 })
 .catch(()=>{
  alert("Camera not allowed")
 })
}

// SCANNER
function scan(){
 if(video.videoWidth===0) return

 let canvas=document.getElementById("canvas")
 let ctx=canvas.getContext("2d")

 canvas.width=video.videoWidth
 canvas.height=video.videoHeight

 ctx.drawImage(video,0,0)

 let y=canvas.height/2
 let step=canvas.width/8

 let bits=""

 for(let i=0;i<8;i++){
  let x=i*step+step/2

  let redCount=0
  let blueCount=0

  for(let dx=-6;dx<=6;dx++){
   for(let dy=-6;dy<=6;dy++){
    let d=ctx.getImageData(x+dx,y+dy,1,1).data

    let r=d[0], g=d[1], b=d[2]

    // RED → 0
    if(r > 140 && r > g+30 && r > b+30){
     redCount++
    }

    // BLUE → 1
    else if(b > 120 && b > r+15){
     blueCount++
    }
   }
  }

  if(blueCount > redCount){
   bits+="1"
  }else if(redCount > blueCount){
   bits+="0"
  }else{
   bits+="-"
  }
 }

 history.push(bits)
 if(history.length>3) history.shift()

 let stable = history.every(v=>v===bits)

 document.getElementById("livebits").innerText="Pattern: "+bits

 if(stable && bits!==last && !bits.includes("-")){
  login(bits)
  last=bits
 }
}

// LOGIN CHECK
function login(pattern){
 let user=users.find(u=>u.pattern===pattern)

 if(user){
  alert("Welcome "+user.name)
 }else{
  alert("Access Denied")
 }
}

// ADMIN LOGIN
function adminLogin(){
 let pass=document.getElementById("adminPass").value

 if(pass===adminPassword){
  let txt="Admin Panel\n\n"

  users.forEach(u=>{
   txt+=`Name: ${u.name}\nPattern: ${u.pattern}\nBalance: ${u.balance}\n\n`
  })

  document.getElementById("adminPanel").innerText=txt
 }else{
  alert("Wrong password")
 }
}

</script>

</body>
</html>
