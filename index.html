<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shape Pattern Scanner</title><script src="https://docs.opencv.org/4.x/opencv.js"></script><style>

body{
margin:0;
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

video{
width:95%;
border:3px solid cyan;
margin-top:20px;
}

canvas{
display:none;
}

#status{
margin-top:20px;
font-size:20px;
color:yellow;
}

button{
padding:12px 25px;
font-size:18px;
margin-top:15px;
}

</style></head><body><h2>Triangle / Circle Pattern Scanner</h2><video id="video" autoplay playsinline></video>
<canvas id="canvas"></canvas>

<br>
<button onclick="startScanner()">Start Scanner</button><div id="status">Waiting...</div><script>

let targetPattern=""
let video=document.getElementById("video")
let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

function startScanner(){

targetPattern=prompt("Enter 8-bit pattern example: 01010101")

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})
.then(stream=>{
video.srcObject=stream
video.onloadedmetadata=()=>{
scanLoop()
}
})

}

function scanLoop(){

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let src=cv.imread(canvas)
let gray=new cv.Mat()

cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY)

let blur=new cv.Mat()
cv.GaussianBlur(gray,blur,new cv.Size(5,5),0)

let edges=new cv.Mat()
cv.Canny(blur,edges,50,150)

let contours=new cv.MatVector()
let hierarchy=new cv.Mat()

cv.findContours(edges,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE)

let bits=[]

for(let i=0;i<contours.size();i++){

let cnt=contours.get(i)
let approx=new cv.Mat()

cv.approxPolyDP(
cnt,
approx,
0.04*cv.arcLength(cnt,true),
true
)

let sides=approx.rows

if(sides==3){

bits.push("0")

}else{

let area=cv.contourArea(cnt)
let rect=cv.boundingRect(cnt)
let ratio=area/(rect.width*rect.height)

if(ratio>0.7){
bits.push("1")
}

}

}

bits.sort()

let detected=bits.join("")

document.getElementById("status").innerText=
"Detected: "+detected

if(detected===targetPattern){

alert("Done")

}

src.delete()
gray.delete()
blur.delete()
edges.delete()
contours.delete()
hierarchy.delete()

requestAnimationFrame(scanLoop)

}

</script></body>
</html>
