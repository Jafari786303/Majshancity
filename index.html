<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Smart Bank</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

.container{
margin-top:40px;
}

input{
padding:10px;
margin:10px;
width:220px;
border-radius:8px;
border:none;
}

button{
padding:10px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
}

video{
width:90%;
max-width:400px;
border-radius:10px;
margin-top:20px;
}

.scanline{
position:absolute;
width:80%;
height:3px;
background:red;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

.cameraBox{
position:relative;
display:inline-block;
}

.circle{
width:20px;
height:20px;
border-radius:50%;
background:blue;
display:inline-block;
margin:5px;
}

.triangle{
width:0;
height:0;
border-left:10px solid transparent;
border-right:10px solid transparent;
border-bottom:20px solid black;
display:inline-block;
margin:5px;
}

</style>
</head>

<body>

<h1>Smart Banking</h1>

<div class="container" id="home">

<button onclick="showCreate()">Create Account</button>
<button onclick="showLogin()">Login</button>

</div>

<div id="create" style="display:none">

<h2>Create Account</h2>

<input id="name" placeholder="Name"><br>
<input id="card" placeholder="Card Number"><br>
<input id="code" placeholder="8 Digit Code"><br>

<button onclick="createAccount()">Create</button>

</div>

<div id="login" style="display:none">

<h2>Enter Card Number</h2>

<input id="loginCard" placeholder="Card Number"><br>

<button onclick="startScanner()">Start Scanner</button>

<div class="cameraBox">

<video id="camera" autoplay></video>
<div class="scanline"></div>

</div>

<br>

<input id="scanCode" placeholder="Scan Result"><br>

<button onclick="login()">Login</button>

</div>

<div id="account" style="display:none">

<h2>Account Dashboard</h2>
<p id="user"></p>

</div>

<script>

function showCreate(){
document.getElementById("home").style.display="none"
document.getElementById("create").style.display="block"
}

function showLogin(){
document.getElementById("home").style.display="none"
document.getElementById("login").style.display="block"
}

function createAccount(){

let name=document.getElementById("name").value
let card=document.getElementById("card").value
let code=document.getElementById("code").value

let data={name,card,code}

localStorage.setItem("bank_"+card,JSON.stringify(data))

alert("Account Created")

}

async function startScanner(){

let stream=await navigator.mediaDevices.getUserMedia({video:true})

document.getElementById("camera").srcObject=stream

}

function login(){

let card=document.getElementById("loginCard").value
let code=document.getElementById("scanCode").value

let data=localStorage.getItem("bank_"+card)

if(!data){
alert("Account not found")
return
}

data=JSON.parse(data)

if(data.code==code){

document.getElementById("login").style.display="none"
document.getElementById("account").style.display="block"

document.getElementById("user").innerText="Welcome "+data.name

}else{

alert("Scan Failed")

}

}

</script>

</body>
</html>
