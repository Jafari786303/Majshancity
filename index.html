<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile Bank</title>

<style>

*{
box-sizing:border-box;
}

html,body{
margin:0;
padding:0;
height:100%;
width:100%;
font-family:Arial;
background:#0a0f1f;
color:white;
overflow-x:hidden;
}

.container{
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
}

h2{
margin-top:10px;
}

button{
padding:10px;
margin:6px;
border:none;
border-radius:6px;
background:#1f4068;
color:white;
font-size:14px;
flex-wrap:wrap;
}

button:hover{
background:#2e5fa3;
}

.panel{
background:#16213e;
margin:10px;
padding:15px;
border-radius:10px;
display:none;
width:95%;
max-width:420px;
max-height:85vh;
overflow-y:auto;
}

.close{
float:right;
background:red;
}

input{
width:100%;
padding:8px;
margin:6px 0;
border-radius:5px;
border:none;
}

.card{
width:100%;
padding:15px;
border-radius:15px;
background:linear-gradient(135deg,#0f3460,#533483);
box-shadow:0 0 15px black;
text-align:left;
}

video{
width:100%;
height:auto;
border:3px solid white;
border-radius:6px;
}

#scanBox{
position:relative;
width:100%;
}

#scanLine{
position:absolute;
width:100%;
height:2px;
background:red;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:10%}
50%{top:90%}
100%{top:10%}
}

.adminCard{
background:#1f4068;
margin:10px 0;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="container">

<h2>Mobile Bank</h2>

<div>

<button onclick="showPanel('loginPanel')">Login</button>
<button onclick="showPanel('createPanel')">Create Account</button>
<button onclick="showPanel('adminPanel')">Admin</button>

</div>


<!-- LOGIN -->

<div id="loginPanel" class="panel">

<button class="close" onclick="closePanel('loginPanel')">X</button>

<h3>Login</h3>

<input id="loginCard" placeholder="Card Number">

<button onclick="startScanner()">Start Scanner</button>

<div id="scanBox">

<video id="video" autoplay></video>
<div id="scanLine"></div>

</div>

<p id="scanOutput"></p>

</div>


<!-- CREATE -->

<div id="createPanel" class="panel">

<button class="close" onclick="closePanel('createPanel')">X</button>

<h3>Create Account</h3>

<input id="name" placeholder="Name">
<input id="job" placeholder="Job">
<input id="cl" placeholder="CL">
<input id="national" placeholder="National No">
<input id="card" placeholder="Card Number">
<input id="pattern" placeholder="8 Digit Pattern">

<button onclick="createAccount()">Create</button>

</div>


<!-- ACCOUNT -->

<div id="accountPanel" class="panel">

<button class="close" onclick="closePanel('accountPanel')">X</button>

<div class="card">

<p id="cardName"></p>
<p id="cardJob"></p>
<p id="cardCL"></p>
<p id="cardNational"></p>
<p id="cardNumber"></p>
<p id="cardBalance"></p>

</div>

<h3>Transfer Money</h3>

<input id="toCard" placeholder="Receiver Card">
<input id="amount" placeholder="Amount">

<button onclick="transfer()">Send</button>

</div>


<!-- ADMIN -->

<div id="adminPanel" class="panel">

<button class="close" onclick="closePanel('adminPanel')">X</button>

<h3>Admin Login</h3>

<input id="adminPin" placeholder="PIN">

<button onclick="adminLogin()">Enter</button>

<div id="adminArea"></div>

</div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("bankAccounts")) || []

if(!accounts.find(a=>a.card=="99999999")){
accounts.push({
name:"City Minister",
job:"Minister",
cl:"VIP",
national:"0000",
card:"99999999",
balance:Infinity,
pattern:"11111111"
})
save()
}

function save(){
localStorage.setItem("bankAccounts",JSON.stringify(accounts))
}

function showPanel(id){
document.getElementById(id).style.display="block"
}

function closePanel(id){
document.getElementById(id).style.display="none"
}

function safe(v){
return v || "Not Set"
}

function createAccount(){

let name=document.getElementById("name").value.trim()

if(name===""){
alert("Name required")
return
}

let acc={
name:name,
job:document.getElementById("job").value,
cl:document.getElementById("cl").value,
national:document.getElementById("national").value,
card:document.getElementById("card").value,
balance:1000,
pattern:document.getElementById("pattern").value
}

accounts.push(acc)
save()

alert("Account Created")

}

let currentAccount

function transfer(){

let to=accounts.find(a=>a.card==document.getElementById("toCard").value)

if(!to){
alert("Receiver not found")
return
}

let amount=parseInt(document.getElementById("amount").value)

if(currentAccount.balance!=Infinity)
currentAccount.balance-=amount

if(to.balance!=Infinity)
to.balance+=amount

save()
showAccount(currentAccount)

}

function showAccount(acc){

showPanel("accountPanel")

document.getElementById("cardName").innerText="Name : "+safe(acc.name)
document.getElementById("cardJob").innerText="Job : "+safe(acc.job)
document.getElementById("cardCL").innerText="CL : "+safe(acc.cl)
document.getElementById("cardNational").innerText="National No : "+safe(acc.national)
document.getElementById("cardNumber").innerText="Card No : "+safe(acc.card)
document.getElementById("cardBalance").innerText="Balance : "+acc.balance

}

let video=document.getElementById("video")
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

async function startScanner(){

let stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=stream
scanLoop()

}

function scanLoop(){

setTimeout(scanLoop,200)

if(video.videoWidth==0) return

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let y=canvas.height/2
let digits=""

for(let i=0;i<8;i++){

let x=(canvas.width/8)*i+(canvas.width/16)

let pixel=ctx.getImageData(x,y,1,1).data

if(pixel[2]>pixel[0])
digits+="1"
else
digits+="0"

}

document.getElementById("scanOutput").innerText="Reading : "+digits

let card=document.getElementById("loginCard").value

let acc=accounts.find(a=>a.card==card && a.pattern==digits)

if(acc){
currentAccount=acc
showAccount(acc)
}

}

function adminLogin(){

if(document.getElementById("adminPin").value!="303786303"){
alert("Wrong Pin")
return
}

let html=""

accounts.forEach((a,i)=>{

html+=`
<div class="adminCard">

<b>${safe(a.name)}</b><br>
Card : ${safe(a.card)}<br>
Balance : ${a.balance}<br>

<button onclick="editAccount(${i})">Edit</button>
<button onclick="deleteAccount(${i})" style="background:red">Delete</button>

</div>
`

})

document.getElementById("adminArea").innerHTML=html

}

function editAccount(i){

let a=accounts[i]

let name=prompt("Name",a.name)
let job=prompt("Job",a.job)
let cl=prompt("CL",a.cl)
let national=prompt("National",a.national)
let card=prompt("Card",a.card)
let pattern=prompt("Pattern",a.pattern)

accounts[i]={...a,name,job,cl,national,card,pattern}

save()
adminLogin()

}

function deleteAccount(i){

if(accounts[i].card=="99999999"){
alert("Minister account cannot be deleted")
return
}

if(!confirm("Delete this account?")) return

accounts.splice(i,1)

save()
adminLogin()

}

</script>

</body>
</html>
