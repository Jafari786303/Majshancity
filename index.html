<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MJ City Bank</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f5132,#198754,#0f5132);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:95%;
max-width:420px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
border-radius:18px;
padding:20px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
text-align:center;
}

.logo{
width:110px;
margin-bottom:10px;
}

.title{
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

.tag{
font-size:14px;
opacity:.8;
margin-bottom:20px;
}

button{
width:90%;
padding:13px;
margin:7px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#20c997,#198754);
color:white;
font-size:15px;
cursor:pointer;
}

input{
width:85%;
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

video{
width:100%;
border-radius:10px;
}

.scanArea{
position:relative;
}

.scanLine{
position:absolute;
width:100%;
height:3px;
background:red;
animation:scan 2s infinite linear;
}

/* CENTER BOX */

.scanBox{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:200px;
height:50px;
border:3px solid #00ff9c;
border-radius:6px;
box-shadow:0 0 10px #00ff9c;
display:grid;
grid-template-columns:repeat(8,1fr);
pointer-events:none;
}

/* 8 divisions */

.scanSlot{
border-right:1px solid #00ff9c;
}

.scanSlot:last-child{
border-right:none;
}

@keyframes scan{
0%{top:10%}
50%{top:90%}
100%{top:10%}
}

.card{
background:white;
color:black;
padding:15px;
border-radius:12px;
text-align:left;
}

.adminBox{
background:white;
color:black;
max-height:200px;
overflow:auto;
border-radius:10px;
padding:10px;
}

.closeBtn{
background:red;
}

canvas{
display:none;
}

</style>
</head>

<body>

<div class="container" id="home">

<img id="logoImg" class="logo">

<div class="title">MJ CITY BANK</div>

<div class="tag">Secure • Smart • Educational Banking</div>

<button onclick="openLogin()">Login</button>
<button onclick="openCreate()">Create Account</button>
<button onclick="openAdmin()">Admin Panel</button>

</div>



<div class="container" id="login" style="display:none">

<h3>Login</h3>

<input id="loginCard" placeholder="Card Number">

<button onclick="startScanner()">Start Scanner</button>

<div class="scanArea">
<video id="camera" autoplay></video>
<div class="scanLine"></div>

<div class="scanBox">
<div class="scanSlot"></div>
<div class="scanSlot"></div>
<div class="scanSlot"></div>
<div class="scanSlot"></div>
<div class="scanSlot"></div>
<div class="scanSlot"></div>
<div class="scanSlot"></div>
<div class="scanSlot"></div>
</div>

</div>

<div id="scanResult"></div>

<button class="closeBtn" onclick="goHome()">Close</button>

</div>



<div class="container" id="create" style="display:none">

<h3>Create Account</h3>

<input id="name" placeholder="Name">
<input id="job" placeholder="Job">
<input id="cl" placeholder="CL">
<input id="nation" placeholder="National No">
<input id="card" placeholder="Card No">
<input id="pattern" placeholder="Pattern (8 digits 0/1)">

<button onclick="createAccount()">Create</button>

<button class="closeBtn" onclick="goHome()">Close</button>

</div>



<div class="container" id="account" style="display:none">

<h3>Your Card</h3>

<div id="cardUI" class="card"></div>

<input id="sendCard" placeholder="Send To Card">
<input id="sendAmount" placeholder="Amount">

<button onclick="sendMoney()">Send Money</button>

<button class="closeBtn" onclick="goHome()">Logout</button>

</div>



<div class="container" id="admin" style="display:none">

<h3>Admin Panel</h3>

<input id="logoURL" placeholder="Logo Image URL">
<button onclick="saveLogo()">Save Logo</button>

<div class="adminBox" id="adminList"></div>

<button onclick="goHome()">Close</button>

</div>



<canvas id="scanCanvas"></canvas>

<script>

/* YOUR ORIGINAL JAVASCRIPT REMAINS UNCHANGED */

</script>

</body>
</html>
