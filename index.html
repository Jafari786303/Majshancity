<!DOCTYPE html>
<html>
<head>
    <title>Majshan Bank</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        input, button {
            padding: 10px;
            margin: 8px;
            width: 220px;
        }
        button {
            background: #22c55e;
            border: none;
            color: white;
            cursor: pointer;
        }
        .hidden { display: none; }
        img { border-radius: 10px; }
        .box {
            border: 1px solid #444;
            padding: 15px;
            margin: 10px;
        }
    </style>
</head>
<body>

<h1>Majshan Bank</h1>

<!-- LOGIN -->
<div id="loginBox">
    <input id="card" placeholder="Card Number"><br>
    <input id="pin" type="password" placeholder="PIN"><br>
    <button onclick="login()">Login</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden">
    <h2>Dashboard</h2>
    <img id="profile" width="100"><br>

    <p>Name: <span id="name"></span></p>
    <p>CNIC: <span id="cnic"></span></p>
    <p>CL: <span id="cl"></span></p>
    <p>Balance: <span id="balance"></span></p>

    <div class="box">
        <h3>Send Money</h3>
        <input id="toCard" placeholder="Receiver Card"><br>
        <input id="amount" placeholder="Amount"><br>
        <button onclick="sendMoney()">Send</button>
    </div>

    <div class="box">
        <h3>Messages</h3>
        <input id="msg" placeholder="Message"><br>
        <button onclick="sendMessage()">Send</button>
        <ul id="messages"></ul>
    </div>

    <button onclick="logout()">Logout</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden">
    <h2>Admin Panel</h2>
    <div id="users"></div>
    <button onclick="logout()">Logout</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import {
  getFirestore, doc, getDoc, getDocs, setDoc, updateDoc, collection
} from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCbho9Xz750QHAGzvQK2H0ymZyXEvVvhZs",
  authDomain: "mathsappdb-ea7d8.firebaseapp.com",
  projectId: "mathsappdb-ea7d8",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentUser = null;

// LOGIN
window.login = async function () {
    const card = cardInput.value;
    const pin = pinInput.value;

    const ref = doc(db, "accounts", card);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
        alert("Account not found");
        return;
    }

    const data = snap.data();

    if (data.pin != pin) {
        alert("Wrong PIN");
        return;
    }

    localStorage.setItem("user", card);

    if (data.role === "admin") {
        showAdmin();
    } else {
        showDashboard();
    }
};

// LOAD USER
async function showDashboard() {
    loginBox.classList.add("hidden");
    dashboard.classList.remove("hidden");

    const card = localStorage.getItem("user");
    const snap = await getDoc(doc(db, "accounts", card));
    const data = snap.data();

    currentUser = data;

    name.innerText = data.name || "";
    cnic.innerText = data.cnic || "";
    cl.innerText = data.cl || "";
    balance.innerText = data.balance || 0;
    profile.src = data.photo || "https://via.placeholder.com/100";
}

// SEND MONEY
window.sendMoney = async function () {
    const to = toCard.value;
    const amt = parseInt(amount.value);

    const senderRef = doc(db, "accounts", localStorage.getItem("user"));
    const receiverRef = doc(db, "accounts", to);

    const senderSnap = await getDoc(senderRef);
    const receiverSnap = await getDoc(receiverRef);

    if (!receiverSnap.exists()) {
        alert("Receiver not found");
        return;
    }

    let sender = senderSnap.data();
    let receiver = receiverSnap.data();

    if (sender.role !== "minister") {
        if (sender.balance < amt) {
            alert("Low balance");
            return;
        }
        sender.balance -= amt;
    }

    receiver.balance += amt;

    await updateDoc(senderRef, { balance: sender.balance });
    await updateDoc(receiverRef, { balance: receiver.balance });

    alert("Transaction done");
    showDashboard();
};

// MESSAGE
window.sendMessage = async function () {
    await setDoc(doc(collection(db, "messages")), {
        from: localStorage.getItem("user"),
        text: msg.value,
        time: Date.now()
    });
    alert("Message sent");
};

// ADMIN
async function showAdmin() {
    loginBox.classList.add("hidden");
    adminPanel.classList.remove("hidden");

    const snap = await getDocs(collection(db, "accounts"));

    users.innerHTML = "";

    snap.forEach(docSnap => {
        const d = docSnap.data();
        users.innerHTML += `
            <div class="box">
                <p>${d.name} | Balance: ${d.balance}</p>
                <button onclick="editUser('${docSnap.id}')">Edit</button>
            </div>
        `;
    });
}

// EDIT USER
window.editUser = async function (card) {
    const val = prompt("New Balance:");
    await updateDoc(doc(db, "accounts", card), {
        balance: parseInt(val)
    });
    showAdmin();
};

// LOGOUT
window.logout = function () {
    localStorage.removeItem("user");
    location.reload();
};

// AUTO LOGIN
const saved = localStorage.getItem("user");
if (saved) {
    const snap = await getDoc(doc(db, "accounts", saved));
    if (snap.exists() && snap.data().role === "admin") {
        showAdmin();
    } else {
        showDashboard();
    }
}
</script>

</body>
</html>
