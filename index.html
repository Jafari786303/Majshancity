<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Scanner Bank</title>
<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background:linear-gradient(135deg,#020617,#0f172a);
 color:#fff;
}.header{ background:#0f172a; padding:18px; font-size:22px; font-weight:bold; text-align:center; letter-spacing:1px; box-shadow:0 4px 10px rgba(0,0,0,0.5); }

.container{ padding:15px; }

.card{ background:linear-gradient(135deg,#1e3a8a,#06b6d4); padding:20px; border-radius:18px; margin-top:15px; box-shadow:0 8px 25px rgba(0,0,0,0.5); }

input{ width:100%; padding:12px; margin-top:10px; border-radius:10px; border:none; outline:none; background:#0b1220; color:#fff; }

button{ width:100%; padding:12px; margin-top:10px; border:none; border-radius:10px; font-weight:bold; cursor:pointer; }

.btn-transfer{background:#22c55e;color:white} .btn-job{background:#334155;color:white} .btn-pin{background:#475569;color:white}

.hidden{display:none}

.balance{ font-size:22px; font-weight:bold; margin-top:10px; }

.overlay{ position:absolute; top:0; left:0; right:0; bottom:0; display:flex; justify-content:space-between; align-items:center; padding:0 5%; pointer-events:none; }

.box{ width:7vw; height:7vw; max-width:40px; max-height:40px; border:2px solid yellow; border-radius:50%; }

</style>
</head>
<body><div class="header">🔵 Shape Scanner Bank</div><div class="container"><div style="position:relative;display:inline-block">
<video id="video" autoplay playsinline style="width:100%;border-radius:12px;"></video>
<div class="overlay" id="overlay"></div>
</div><div id="livebits">Pattern: --------</div><input type="password" id="password" placeholder="Enter PIN"><div id="account" class="hidden"><div class="card" id="card"></div><div style="margin-top:15px">
 <input id="toCard" placeholder="Receiver Card">
 <input id="amount" type="number" placeholder="Amount">
 <button class="btn-transfer" onclick="transfer()">Transfer Money</button>
</div><div style="margin-top:15px">
 <button class="btn-job" onclick="showJob()">Change Job</button>
 <div id="jobbox" class="hidden">
  <input id="newjob" placeholder="New Job">
  <button class="btn-job" onclick="changeJob()">Update Job</button>
 </div>
</div><div style="margin-top:15px">
 <button class="btn-pin" onclick="showPin()">Change PIN</button>
 <div id="pinbox" class="hidden">
  <input id="oldpin" placeholder="Old PIN">
  <input id="newpin" placeholder="New PIN">
  <button class="btn-pin" onclick="changePin()">Update PIN</button>
 </div>
</div></div><canvas id="canvas" class="hidden"></canvas>

</div><script>

/* overlay */
let overlay=document.getElementById("overlay")
for(let i=0;i<8;i++){
 let b=document.createElement("div")
 b.className="box"
 overlay.appendChild(b)
}

/* camera */
let video=document.getElementById("video")
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>video.srcObject=s)

/* DB */
let db
let req=indexedDB.open("ShapeBankDB",1)

req.onupgradeneeded=e=>{
 db=e.target.result
 let s=db.createObjectStore("accounts",{keyPath:"card"})

 s.add({name:"Bank Minister",job:"Minister",balance:999999999,card:"9999",password:"9999",pattern:"11111111",unlimited:true})
 s.add({name:"Hassan Abbas",job:"Teacher",balance:10000,card:"4444",password:"4444",pattern:"10101010"})
 s.add({name:"Hussain Abbas",job:"Engineer",balance:7000,card:"5555",password:"5555",pattern:"11001100"})
 s.add({name:"Muhammad",job:"Student",balance:5000,card:"7777",password:"1234",pattern:"10101010"})
}

req.onsuccess=e=>db=e.target.result

let current=null
let history=[]
let last=""

/* SCAN */
function scan(){
 if(video.videoWidth===0) return
 let canvas=document.getElementById("canvas")
 let ctx=canvas.getContext("2d")
 canvas.width=video.videoWidth
 canvas.height=video.videoHeight
 ctx.drawImage(video,0,0)

 let y=canvas.height/2
 let step=canvas.width/8
 let bits=""

 for(let i=0;i<8;i++){
  let x=i*step+step/2
  let r=0,g=0,b=0,count=0

  for(let dx=-5;dx<=5;dx++){
   for(let dy=-5;dy<=5;dy++){
    let d=ctx.getImageData(x+dx,y+dy,1,1).data
    r+=d[0]; g+=d[1]; b+=d[2]; count++
   }
  }

  r/=count; g/=count; b/=count

  if(b>r && b>g) bits+="1"
  else if(r>g && r>b) bits+="0"
  else bits+="-"
 }

 history.push(bits)
 if(history.length>3) history.shift()

 let stable = history.every(v=>v===bits)

 document.getElementById("livebits").innerText="Pattern: "+bits

 if(stable && bits!==last){
  login(bits)
  last=bits
 }
}

setInterval(scan,120)

/* LOGIN */
function login(p){
 let pass=document.getElementById("password").value
 if(!pass) return

 let tx=db.transaction("accounts","readonly")
 let store=tx.objectStore("accounts")

 store.openCursor().onsuccess=e=>{
  let c=e.target.result
  if(c){
   let a=c.value

   if(a.pattern===p && a.password===pass){
    current=a
    document.getElementById("account").classList.remove("hidden")
    updateCard()
   }
   c.continue()
  }
 }
}

function updateCard(){
 document.getElementById("card").innerHTML=`
 Name: ${current.name}<br>
 Job: ${current.job}<br>
 Balance: ${current.unlimited?"Unlimited":current.balance}<br>
 Card: ${current.card}
 `
}

function transfer(){
 let amt=parseInt(document.getElementById("amount").value)
 let toCard=document.getElementById("toCard").value

 if(!amt || !toCard){alert("Enter details");return}
 if(current.balance<amt){alert("Insufficient balance");return}

 let tx=db.transaction("accounts","readwrite")
 let store=tx.objectStore("accounts")

 let req=store.get(toCard)

 req.onsuccess=e=>{
  let receiver=e.target.result
  if(!receiver){alert("Receiver not found");return}

  current.balance-=amt
  receiver.balance+=amt

  store.put(current)
  store.put(receiver)

  updateCard()
  alert("Transfer Successful")
 }
}

function showJob(){
 document.getElementById("jobbox").classList.remove("hidden")
}

function changeJob(){
 let j=document.getElementById("newjob").value
 if(!j){alert("Enter job");return}
 current.job=j
 save()
}

function showPin(){
 document.getElementById("pinbox").classList.remove("hidden")
}

function changePin(){
 let oldp=document.getElementById("oldpin").value
 let newp=document.getElementById("newpin").value
 if(current.password!==oldp){alert("Wrong PIN");return}
 current.password=newp
 save()
 alert("PIN Updated")
}

function save(){
 let tx=db.transaction("accounts","readwrite")
 let store=tx.objectStore("accounts")
 store.put(current)
 updateCard()
}

</script></body>
</html>
