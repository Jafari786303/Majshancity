<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MJ City Bank</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f3d2e;
color:white;
text-align:center;
overflow:hidden;
}

#container{
width:100%;
height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.card{
background:#145c3f;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px black;
width:90%;
max-width:350px;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#1fa463;
color:white;
font-size:16px;
margin-top:10px;
width:100%;
}

input{
width:95%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
}

#scannerBox{
margin-top:20px;
border:3px solid #1fa463;
width:220px;
height:220px;
position:relative;
}

#line{
position:absolute;
width:100%;
height:3px;
background:red;
top:0;
animation:scan 2s infinite linear;
}

@keyframes scan{
0%{top:0}
100%{top:100%}
}

#reading{
margin-top:10px;
font-size:18px;
color:#8cffb8;
}

</style>
</head>

<body>

<div id="container">

<div class="card" id="loginPage">

<h2>MJ City Bank</h2>

<input id="cardInput" placeholder="Enter Card Number">

<button onclick="startScanner()">Start Scan</button>

<div id="scannerBox">

<div id="line"></div>

</div>

<div id="reading">Reading : ----</div>

</div>

</div>

<script>

let accounts={
"1001":{
name:"City Minister",
job:"Minister",
balance:999999999999
},

"2001":{
name:"Hassan Abbas",
job:"Engineer",
balance:50000
},

"2002":{
name:"Hussain Abbas",
job:"Teacher",
balance:45000
}
}

let scanning=false
let pattern=""

function startScanner(){

scanning=true
pattern=randomPattern()

scanLoop()

}

function randomPattern(){

let p=""

for(let i=0;i<8;i++){

p+=Math.random()>0.5?"1":"0"

}

return p

}

function scanLoop(){

if(!scanning)return

let reading=""

for(let i=0;i<8;i++){

reading+=Math.random()>0.5?"1":"0"

}

document.getElementById("reading").innerText="Reading : "+reading

if(reading===pattern){

login()

}

setTimeout(scanLoop,120)

}

function login(){

scanning=false

let card=document.getElementById("cardInput").value

let acc=accounts[card]

if(!acc){

alert("Account not found")

return

}

alert(
"Name : "+acc.name+
"\nJob : "+acc.job+
"\nBalance : "+acc.balance
)

}

</script>

</body>
</html>
