<script>

let video=document.getElementById("video")
let history=[]
let last=""
let scanning=false

// USERS
let users=[
{name:"Muhammad",pattern:"10100101",balance:5000},
{name:"Hassan",pattern:"11001100",balance:8000},
{name:"Hussain",pattern:"00110011",balance:12000}
]

// ADMIN
let adminPassword="mjgogog786"

// START CAMERA
function startCam(){
 navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
 })
 .then(stream=>{
  video.srcObject=stream
  startScanning()
 })
 .catch(()=>alert("Camera not allowed"))
}

// AUTO SCANNING LOOP
function startScanning(){
 scanning=true

 function loop(){
  if(!scanning) return

  scan()

  requestAnimationFrame(loop)
 }

 loop()
}

// SCAN FUNCTION
function scan(){
 if(video.videoWidth===0) return

 let canvas=document.getElementById("canvas")
 let ctx=canvas.getContext("2d")

 canvas.width=video.videoWidth
 canvas.height=video.videoHeight

 ctx.drawImage(video,0,0)

 let y=canvas.height/2
 let step=canvas.width/8

 let bits=""

 for(let i=0;i<8;i++){
  let x=i*step+step/2

  let blue=0
  let red=0

  for(let dx=-4;dx<=4;dx++){
   for(let dy=-4;dy<=4;dy++){

    let d=ctx.getImageData(x+dx,y+dy,1,1).data
    let r=d[0],g=d[1],b=d[2]

    if(r>150 && r>g+30 && r>b+30){
     red++
    }

    if(b>130 && b>r+20){
     blue++
    }

   }
  }

  bits += blue > red ? "1" : "0"
 }

 history.push(bits)
 if(history.length>5) history.shift()

 // show live pattern
 document.getElementById("patternText").innerText="Pattern: "+bits

 // check stability
 let stable = history.length===5 && history.every(v=>v===bits)

 // LOGIN IF MATCH
 if(stable && bits!==last){
  login(bits)
  last=bits
 }
}

// LOGIN
function login(p){
 let user=users.find(u=>u.pattern===p)

 if(user){
  alert("Welcome "+user.name)
 }else{
  alert("Access Denied")
 }
}

// ADMIN
function adminLogin(){
 let pass=document.getElementById("adminPass").value

 if(pass===adminPassword){
  let txt="ADMIN PANEL\n\n"

  users.forEach(u=>{
   txt+=`Name: ${u.name}\nPattern: ${u.pattern}\nBalance: ${u.balance}\n\n`
  })

  document.getElementById("adminPanel").innerText=txt
 }else{
  alert("Wrong password")
 }
}

</script>
