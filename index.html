<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mobile Bank</title>

<style>
body{
font-family:Arial;
background:#0a0f1f;
color:white;
text-align:center;
}

.panel{
background:#16213e;
padding:20px;
margin:20px;
border-radius:10px;
display:none;
}

button{
padding:10px;
margin:5px;
background:#1f4068;
color:white;
border:none;
border-radius:5px;
}

.close{
background:red;
float:right;
}

#video{
width:100%;
max-width:400px;
border:3px solid white;
}

#scanLine{
position:absolute;
width:100%;
height:2px;
background:red;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:10%}
50%{top:90%}
100%{top:10%}
}

.card{
width:300px;
background:linear-gradient(135deg,#0f3460,#533483);
padding:20px;
border-radius:15px;
margin:auto;
}

input{
padding:8px;
margin:5px;
}

</style>
</head>

<body>

<h2>Mobile Bank</h2>

<button onclick="showLogin()">Login</button>
<button onclick="showCreate()">Create Account</button>
<button onclick="showAdmin()">Admin</button>

<!-- LOGIN -->
<div id="loginPanel" class="panel">
<button class="close" onclick="closePanel('loginPanel')">X</button>

<h3>Login</h3>

<input id="loginCard" placeholder="Card Number">

<br>

<button onclick="startScanner()">Start Scanner</button>

<div style="position:relative">
<video id="video" autoplay></video>
<div id="scanLine"></div>
</div>

<p id="scanOutput"></p>

</div>

<!-- CREATE ACCOUNT -->

<div id="createPanel" class="panel">
<button class="close" onclick="closePanel('createPanel')">X</button>

<h3>Create Account</h3>

<input id="name" placeholder="Name"><br>
<input id="job" placeholder="Job"><br>
<input id="cl" placeholder="CL"><br>
<input id="national" placeholder="National No"><br>
<input id="card" placeholder="Card No"><br>
<input id="pattern" placeholder="8 digit code"><br>

<button onclick="createAccount()">Create</button>

</div>

<!-- ACCOUNT -->

<div id="accountPanel" class="panel">
<button class="close" onclick="closePanel('accountPanel')">X</button>

<div class="card">

<p id="cardName"></p>
<p id="cardJob"></p>
<p id="cardCL"></p>
<p id="cardNational"></p>
<p id="cardNumber"></p>
<p id="cardBalance"></p>

</div>

<h3>Transfer</h3>

<input id="toCard" placeholder="To Card">
<input id="amount" placeholder="Amount">

<button onclick="transfer()">Send</button>

</div>

<!-- ADMIN -->

<div id="adminPanel" class="panel">
<button class="close" onclick="closePanel('adminPanel')">X</button>

<h3>Admin Login</h3>

<input id="adminPin" placeholder="PIN">
<button onclick="adminLogin()">Enter</button>

<div id="adminArea"></div>

</div>

<script>

let accounts = JSON.parse(localStorage.getItem("bankAccounts")) || []

if(!accounts.find(a=>a.card=="99999999")){
accounts.push({
name:"City Minister",
job:"Minister",
cl:"VIP",
national:"0000",
card:"99999999",
balance:Infinity,
pattern:"11111111"
})
save()
}

function save(){
localStorage.setItem("bankAccounts",JSON.stringify(accounts))
}

function showLogin(){document.getElementById("loginPanel").style.display="block"}
function showCreate(){document.getElementById("createPanel").style.display="block"}
function showAdmin(){document.getElementById("adminPanel").style.display="block"}

function closePanel(id){document.getElementById(id).style.display="none"}

function createAccount(){

let acc={
name:name.value,
job:job.value,
cl:cl.value,
national:national.value,
card:card.value,
balance:1000,
pattern:pattern.value
}

accounts.push(acc)
save()

alert("Account created")

}

function transfer(){

let to=accounts.find(a=>a.card==toCard.value)
let from=currentAccount

let amount=parseInt(document.getElementById("amount").value)

if(from.balance!=Infinity) from.balance-=amount
if(to.balance!=Infinity) to.balance+=amount

save()

showAccount(from)

}

let video=document.getElementById("video")
let canvas=document.createElement("canvas")
let ctx=canvas.getContext("2d")

async function startScanner(){

let stream=await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

video.srcObject=stream

scanLoop()

}

function scanLoop(){

setTimeout(scanLoop,200)

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let y=canvas.height/2

let digits=""

for(let i=0;i<8;i++){

let x=(canvas.width/8)*i+(canvas.width/16)

let pixel=ctx.getImageData(x,y,1,1).data

if(pixel[2]>pixel[0]) digits+="1"
else digits+="0"

}

scanOutput.innerText=digits

let card=loginCard.value

let acc=accounts.find(a=>a.card==card && a.pattern==digits)

if(acc){
currentAccount=acc
showAccount(acc)
}

}

let currentAccount

function showAccount(acc){

accountPanel.style.display="block"

cardName.innerText="Name : "+acc.name
cardJob.innerText="Job : "+acc.job
cardCL.innerText="CL : "+acc.cl
cardNational.innerText="National : "+acc.national
cardNumber.innerText="Card : "+acc.card
cardBalance.innerText="Balance : "+acc.balance

}

function adminLogin(){

if(adminPin.value!="303786303") return alert("Wrong pin")

let html=""

accounts.forEach((a,i)=>{

html+=`
<div>
${a.name} - ${a.card}
<button onclick="edit(${i})">Edit</button>
</div>
`

})

adminArea.innerHTML=html

}

function edit(i){

let a=accounts[i]

let name=prompt("Name",a.name)
let job=prompt("Job",a.job)
let cl=prompt("CL",a.cl)
let national=prompt("National",a.national)
let card=prompt("Card",a.card)
let pattern=prompt("Pattern",a.pattern)

accounts[i]={...a,name,job,cl,national,card,pattern}

save()

adminLogin()

}

</script>

</body>
</html>
