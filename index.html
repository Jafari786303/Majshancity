<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shape Scanner Bank</title>

<style>
body{
 margin:0;
 font-family:'Segoe UI',sans-serif;
 background:linear-gradient(135deg,#020617,#0f172a);
 color:#fff;
}

.header{
 background:#0f172a;
 padding:18px;
 font-size:22px;
 text-align:center;
}

.container{padding:15px}

.card{
 background:linear-gradient(135deg,#1e3a8a,#06b6d4);
 padding:20px;
 border-radius:18px;
 margin-top:15px;
 text-align:center;
}

button{
 width:100%;
 padding:12px;
 margin-top:10px;
 border:none;
 border-radius:10px;
 font-weight:bold;
 cursor:pointer;
}

.btn{background:#22c55e;color:white}
.btn-danger{background:#ef4444}
.hidden{display:none}

.overlay{
 position:absolute;
 top:0;left:0;right:0;bottom:0;
 display:flex;
 justify-content:space-between;
 align-items:center;
 padding:0 5%;
 pointer-events:none;
}

.box{
 width:7vw;
 height:7vw;
 max-width:40px;
 max-height:40px;
 border:2px solid yellow;
 border-radius:50%;
}
</style>
</head>

<body>

<div class="header">🔵 Shape Scanner Bank</div>

<div class="container" id="mainUI">

<div style="position:relative">
<video id="video" autoplay playsinline style="width:100%;border-radius:12px;"></video>
<div class="overlay" id="overlay"></div>
</div>

<div id="livebits">Pattern: --------</div>

<input type="password" id="password" placeholder="Enter PIN">

<button class="btn" onclick="adminAccess()">Admin Access</button>

</div>

<div id="accountUI" class="hidden">
<div class="card" id="card"></div>

<button class="btn" onclick="transfer()">Transfer</button>
<button class="btn" onclick="changeJob()">Change Job</button>
<button class="btn" onclick="changePin()">Change PIN</button>
<button class="btn-danger" onclick="logout()">Logout</button>

<div id="adminPanel" class="hidden"></div>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>

/* overlay */
let overlay=document.getElementById("overlay")
for(let i=0;i<8;i++){
 let b=document.createElement("div")
 b.className="box"
 overlay.appendChild(b)
}

/* camera */
let video=document.getElementById("video")
let stream

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>{
 stream=s
 video.srcObject=s
})

function stopCamera(){
 if(stream){
  stream.getTracks().forEach(t=>t.stop())
 }
}

/* DB */
let db
let req=indexedDB.open("ShapeBankDB",1)

req.onupgradeneeded=e=>{
 db=e.target.result
 let s=db.createObjectStore("accounts",{keyPath:"card"})

 s.add({name:"Bank Minister",job:"Minister",balance:999999999,card:"9999",password:"9999",pattern:"11111111",unlimited:true})
 s.add({name:"Hussain Abbas",job:"Student",balance:5000,card:"7777",password:"1234",pattern:"10100101"})
}

req.onsuccess=e=>db=e.target.result

let current=null
let history=[]
let last=""

/* SCAN */
function scan(){
 if(video.videoWidth===0) return

 let canvas=document.getElementById("canvas")
 let ctx=canvas.getContext("2d")
 canvas.width=video.videoWidth
 canvas.height=video.videoHeight
 ctx.drawImage(video,0,0)

 let y=canvas.height/2
 let step=canvas.width/8
 let bits=""

 for(let i=0;i<8;i++){
  let x=i*step+step/2
  let d=ctx.getImageData(x,y,1,1).data
  if(d[2]>d[0] && d[2]>d[1]) bits+="1"
  else if(d[0]>d[1] && d[0]>d[2]) bits+="0"
  else bits+="-"
 }

 history.push(bits)
 if(history.length>3) history.shift()

 let stable = history.every(v=>v===bits)

 document.getElementById("livebits").innerText="Pattern: "+bits

 if(stable && bits!==last){
  login(bits)
  last=bits
 }
}

setInterval(scan,150)

/* LOGIN */
function login(p){
 let pass=document.getElementById("password").value
 if(!pass) return

 let tx=db.transaction("accounts","readonly")
 let store=tx.objectStore("accounts")

 store.openCursor().onsuccess=e=>{
  let c=e.target.result
  if(c){
   let a=c.value

   if(a.pattern===p && a.password===pass){
    current=a
    successUI()
   }
   c.continue()
  }
 }
}

/* SUCCESS UI */
function successUI(){
 navigator.vibrate(200)

 stopCamera()

 document.getElementById("mainUI").classList.add("hidden")
 document.getElementById("accountUI").classList.remove("hidden")

 updateCard()
}

function updateCard(){
 document.getElementById("card").innerHTML=`
 <h2>${current.name}</h2>
 Job: ${current.job}<br>
 Balance: ${current.unlimited?"Unlimited":current.balance}<br>
 Card: ${current.card}
 `
}

/* ADMIN ACCESS */
function adminAccess(){
 let pass=prompt("Enter Admin Password")

 if(pass==="mjgogog786"){
  let panel=document.getElementById("adminPanel")
  panel.innerHTML=""
  panel.classList.remove("hidden")

  let tx=db.transaction("accounts","readonly")
  let store=tx.objectStore("accounts")

  store.openCursor().onsuccess=e=>{
   let c=e.target.result
   if(c){
    let a=c.value
    panel.innerHTML+=`
     <div class="card">
     ${a.name}<br>
     Card: ${a.card}<br>
     PIN: ${a.password}<br>
     Pattern: ${a.pattern}
     </div>
    `
    c.continue()
   }
  }
 }
}

/* ACTIONS */
function transfer(){
 alert("Transfer Done")
 navigator.vibrate(200)
 successUI()
}

function changeJob(){
 let j=prompt("Enter new job")
 if(!j) return
 current.job=j
 save()
}

function changePin(){
 let oldp=prompt("Old PIN")
 let newp=prompt("New PIN")

 if(current.password!==oldp){
  alert("Wrong PIN"); return
 }

 current.password=newp
 save()
}

function save(){
 let tx=db.transaction("accounts","readwrite")
 let store=tx.objectStore("accounts")
 store.put(current)

 navigator.vibrate(200)
 successUI()
}

/* LOGOUT */
function logout(){
 location.reload()
}

</script>

</body>
</html>
