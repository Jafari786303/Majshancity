<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circle Line Scanner Bank</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center
}

video{
width:92%;
max-width:420px;
border-radius:12px;
margin-top:10px
}

button{
padding:10px;
border:none;
border-radius:10px;
background:#22c55e;
color:black;
margin-top:10px
}

input{
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
width:80%
}

.card{
background:linear-gradient(135deg,#2563eb,#06b6d4);
padding:15px;
border-radius:15px;
margin-top:10px;
width:90%;
max-width:380px;
margin:auto;
text-align:left
}

.hidden{display:none}

.line{
position:absolute;
top:50%;
left:0;
right:0;
height:2px;
background:red;
}
</style>
</head>

<body>

<h2>Auto Circle Scanner Bank</h2>

<div style="position:relative;display:inline-block">
<video id="video" autoplay playsinline></video>
<div class="line"></div>
</div>

<div id="livebits" style="margin-top:10px;font-size:18px;color:#22c55e">
Pattern: --------
</div>

<div id="confidence" style="font-size:14px;color:#ccc"></div>

<input type="password" id="password" placeholder="Enter PIN">

<div id="account" class="hidden">
<h3>Account</h3>
<div class="card" id="card"></div>

<button onclick="showTx()">Transaction</button>
<button onclick="showPin()">Change PIN</button>
<button onclick="showAll()">All Accounts</button>

<div id="tx" class="hidden">
<input id="receiver" placeholder="Receiver Card">
<input id="amount" placeholder="Amount">
<button onclick="send()">Send</button>
</div>

<div id="pinbox" class="hidden">
<input id="oldpin" placeholder="Old PIN">
<input id="newpin" placeholder="New PIN">
<button onclick="changePin()">Update PIN</button>
</div>

<div id="allaccounts" class="hidden"></div>

</div>

<canvas id="canvas" class="hidden"></canvas>

<script>

let video=document.getElementById("video")
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(s=>video.srcObject=s)

let db
let req=indexedDB.open("MiniBankDB4",1)

req.onupgradeneeded=e=>{
db=e.target.result
let s=db.createObjectStore("accounts",{keyPath:"card"})

s.add({name:"Bank Minister",job:"Minister",balance:999999999,card:"9999",password:"9999",pattern:"11111111",unlimited:true})
s.add({name:"Hassan Abbas",job:"Teacher",balance:10000,card:"4444",password:"4444",pattern:"11000011"})
s.add({name:"Hussain Abbas",job:"Engineer",balance:7000,card:"5555",password:"5555",pattern:"10100101"})
}

req.onsuccess=e=>db=e.target.result

let current=null

/* ===== SMART SCANNER ===== */

let history=[]
let stablePattern=""
let lastLogin=""

function scan(){

if(video.videoWidth===0) return

let canvas=document.getElementById("canvas")
let ctx=canvas.getContext("2d")

canvas.width=video.videoWidth
canvas.height=video.videoHeight

ctx.drawImage(video,0,0)

let y=Math.floor(canvas.height/2)
let width=canvas.width

let bits=""
let segments=8
let step=Math.floor(width/segments)

/* adaptive brightness */
let globalSum=0

for(let i=0;i<20;i++){
let d=ctx.getImageData(i*10,y,1,1).data
globalSum+=(d[0]+d[1]+d[2])/3
}

let threshold=(globalSum/20) - 20

for(let i=0;i<segments;i++){

let x=Math.floor(i*step + step/2)

let sum=0

for(let dx=-2; dx<=2; dx++){
for(let dy=-2; dy<=2; dy++){
let d=ctx.getImageData(x+dx,y+dy,1,1).data
sum+=(d[0]+d[1]+d[2])/3
}
}

let avg=sum/25

if(avg<threshold) bits+="1"
else bits+="0"
}

/* smoothing */
history.push(bits)
if(history.length>5) history.shift()

let count={}
history.forEach(b=>count[b]=(count[b]||0)+1)

stablePattern=Object.keys(count).sort((a,b)=>count[b]-count[a])[0]

/* confidence */
let conf=count[stablePattern]/history.length

document.getElementById("livebits").innerText="Pattern: "+stablePattern
document.getElementById("confidence").innerText="Confidence: "+Math.round(conf*100)+"%"

/* auto login */
if(conf>0.7 && stablePattern!==lastLogin){
login(stablePattern)
lastLogin=stablePattern
}

}

/* run auto */
setInterval(scan,300)

/* ===== LOGIN ===== */

function login(p){

let pass=document.getElementById("password").value
if(!pass) return

let tx=db.transaction("accounts","readonly")
let store=tx.objectStore("accounts")

store.openCursor().onsuccess=e=>{
let cursor=e.target.result

if(cursor){

let acc=cursor.value

if(acc.pattern===p && acc.password===pass){

current=acc
document.getElementById("account").classList.remove("hidden")
showCard()
}

cursor.continue()
}
}
}

/* ===== UI ===== */

function showCard(){
document.getElementById("card").innerHTML=`
Name: ${current.name}<br>
Job: ${current.job}<br>
Balance: ${current.unlimited ? "Unlimited" : current.balance}<br>
Card: ${current.card}
`
}

function showTx(){
document.getElementById("tx").classList.remove("hidden")
}

function showPin(){
document.getElementById("pinbox").classList.remove("hidden")
}

function showAll(){

let div=document.getElementById("allaccounts")
div.classList.remove("hidden")
div.innerHTML="<h3>All Accounts</h3>"

let tx=db.transaction("accounts","readonly")
let store=tx.objectStore("accounts")

store.openCursor().onsuccess=e=>{
let c=e.target.result

if(c){
let a=c.value

div.innerHTML+=`
<div class="card">
Name: ${a.name}<br>
Card: ${a.card}<br>
PIN: ${a.password}<br>
Pattern: ${a.pattern}<br>
Balance: ${a.unlimited ? "Unlimited" : a.balance}
</div>
`

c.continue()
}
}
}

/* ===== TRANSACTION ===== */

function send(){

let rec=document.getElementById("receiver").value
let amt=parseInt(document.getElementById("amount").value)

let tx=db.transaction("accounts","readwrite")
let store=tx.objectStore("accounts")

let s=store.get(current.card)
let r=store.get(rec)

s.onsuccess=()=>{

let sender=s.result

if(!sender.unlimited && sender.balance<amt){
alert("Not enough balance")
return
}

r.onsuccess=()=>{

let receiver=r.result
if(!receiver){alert("Receiver not found");return}

if(!sender.unlimited){
sender.balance-=amt
}

receiver.balance+=amt

store.put(sender)
store.put(receiver)

current=sender
showCard()

alert("Transaction Success")
}
}
}

/* ===== PIN CHANGE ===== */

function changePin(){

let oldp=document.getElementById("oldpin").value
let newp=document.getElementById("newpin").value

if(oldp!==current.password){
alert("Wrong old PIN")
return
}

let tx=db.transaction("accounts","readwrite")
let store=tx.objectStore("accounts")

current.password=newp
store.put(current)

alert("PIN Updated")
}

</script>

</body>
</html>
