<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MJ City Bank</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#0f5132,#198754,#0f5132);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
width:95%;
max-width:420px;
background:rgba(0,0,0,0.35);
backdrop-filter:blur(10px);
border-radius:18px;
padding:20px;
box-shadow:0 0 25px rgba(0,0,0,0.5);
text-align:center;
}

.logo{
width:110px;
margin-bottom:10px;
}

.title{
font-size:28px;
font-weight:bold;
letter-spacing:2px;
}

.tag{
font-size:14px;
opacity:.8;
margin-bottom:20px;
}

button{
width:90%;
padding:13px;
margin:7px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#20c997,#198754);
color:white;
font-size:15px;
cursor:pointer;
}

input{
width:85%;
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

video{
width:100%;
border-radius:10px;
}

.scanArea{
position:relative;
}

.scanLine{
position:absolute;
width:100%;
height:3px;
background:red;
animation:scan 2s infinite linear;
}

@keyframes scan{
0%{top:10%}
50%{top:90%}
100%{top:10%}
}

.card{
background:white;
color:black;
padding:15px;
border-radius:12px;
text-align:left;
}

.adminBox{
background:white;
color:black;
max-height:260px;
overflow:auto;
border-radius:10px;
padding:10px;
}

.closeBtn{
background:red;
}

</style>
</head>

<body>

<div class="container" id="home">

<img src="file_00000000b1f871faa279ac0fbd4cd914.png" class="logo">

<div class="title">MJ CITY BANK</div>

<div class="tag">Secure • Smart • Educational Banking</div>

<button onclick="openLogin()">Login</button>

<button onclick="openCreate()">Create Account</button>

<button onclick="openAdmin()">Admin Panel</button>

</div>



<div class="container" id="login" style="display:none">

<h3>Login</h3>

<input id="loginCard" placeholder="Card Number">

<button onclick="startScanner()">Start Scanner</button>

<div class="scanArea">

<video id="camera" autoplay></video>

<div class="scanLine"></div>

</div>

<div id="scanResult"></div>

<button class="closeBtn" onclick="goHome()">Close</button>

</div>



<div class="container" id="create" style="display:none">

<h3>Create Account</h3>

<input id="name" placeholder="Name">

<input id="job" placeholder="Job">

<input id="cl" placeholder="CL">

<input id="nation" placeholder="National No">

<input id="card" placeholder="Card No">

<input id="pattern" placeholder="Pattern (8 digits 0/1)">

<button onclick="createAccount()">Create</button>

<button class="closeBtn" onclick="goHome()">Close</button>

</div>



<div class="container" id="account" style="display:none">

<h3>Your Card</h3>

<div id="cardUI" class="card"></div>

<input id="sendCard" placeholder="Send To Card">

<input id="sendAmount" placeholder="Amount">

<button onclick="sendMoney()">Send Money</button>

<button class="closeBtn" onclick="goHome()">Logout</button>

</div>



<div class="container" id="admin" style="display:none">

<h3>Admin Panel</h3>

<div class="adminBox" id="adminList"></div>

<button onclick="goHome()">Close</button>

</div>



<script>

let accounts=JSON.parse(localStorage.getItem("mj_accounts"))||{}

let currentAccount=null



if(!accounts["0000"]){

accounts["0000"]={
name:"City Minister",
job:"Minister",
cl:"VIP",
nation:"000000",
card:"0000",
balance:999999999999999,
pattern:"11111111"
}

}



function saveData(){

localStorage.setItem("mj_accounts",JSON.stringify(accounts))

}



function hideAll(){

home.style.display="none"
login.style.display="none"
create.style.display="none"
account.style.display="none"
admin.style.display="none"

}



function goHome(){

location.reload()

}



function openLogin(){

hideAll()
login.style.display="block"

}



function openCreate(){

hideAll()
create.style.display="block"

}



function openAdmin(){

let pin=prompt("Enter Admin Pin")

if(pin!="303786303") return

hideAll()

admin.style.display="block"

loadAdmin()

}



function createAccount(){

let c=card.value

accounts[c]={

name:name.value,
job:job.value,
cl:cl.value,
nation:nation.value,
card:c,
balance:0,
pattern:pattern.value

}

saveData()

alert("Account Created")

}



async function startScanner(){

let stream=await navigator.mediaDevices.getUserMedia({

video:{facingMode:"environment"}

})

camera.srcObject=stream

setInterval(scanCenter,500)

}



function scanCenter(){

let card=loginCard.value

if(!accounts[card]) return

let reading=""

for(let i=0;i<8;i++){

reading+=Math.random()>0.5?"1":"0"

}

scanResult.innerText="Reading : "+reading

if(reading===accounts[card].pattern){

loginAccount(card)

}

}



function loginAccount(card){

currentAccount=accounts[card]

hideAll()

account.style.display="block"

displayCard()

}



function displayCard(){

cardUI.innerHTML=

`
Name : ${currentAccount.name} <br>
Job : ${currentAccount.job} <br>
CL : ${currentAccount.cl} <br>
National No : ${currentAccount.nation} <br>
Card No : ${currentAccount.card} <br>
Balance : ${currentAccount.balance}
`

}



function sendMoney(){

let to=sendCard.value
let amount=parseInt(sendAmount.value)

if(!accounts[to]){

alert("Account not found")

return

}

if(currentAccount.balance<amount){

alert("Not enough balance")

return

}

currentAccount.balance-=amount

accounts[to].balance+=amount

saveData()

displayCard()

}



function loadAdmin(){

let html=""

for(let id in accounts){

let a=accounts[id]

html+=`

<div>

<b>${a.name}</b> (${a.card}) <br>

Balance : ${a.balance} <br>

<button onclick="editAccount('${id}')">Edit</button>

<button onclick="deleteAccount('${id}')">Delete</button>

<hr>

</div>

`

}

adminList.innerHTML=html

}



function editAccount(id){

let n=prompt("Name",accounts[id].name)

let p=prompt("Pattern",accounts[id].pattern)

accounts[id].name=n

accounts[id].pattern=p

saveData()

loadAdmin()

}



function deleteAccount(id){

delete accounts[id]

saveData()

loadAdmin()

}

</script>

</body>
</html>
