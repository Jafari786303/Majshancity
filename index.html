<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>National Digital Bank</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

button{
padding:10px;
margin:8px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}

.panel{
display:none;
background:#111;
padding:20px;
margin:10px;
border-radius:15px;
}

.card{
width:320px;
margin:auto;
background:linear-gradient(45deg,#111,#333);
border-radius:15px;
padding:20px;
box-shadow:0 0 20px cyan;
}

video{
width:320px;
border-radius:10px;
}

.scanBox{
position:relative;
width:320px;
margin:auto;
}

.scanLine{
position:absolute;
width:100%;
height:3px;
background:red;
top:50%;
animation:scan 2s infinite;
}

@keyframes scan{
0%{top:0}
50%{top:100%}
100%{top:0}
}

.reading{
background:black;
padding:5px;
margin:5px;
}

</style>

</head>

<body>

<h1>National Digital Bank</h1>

<button onclick="openPanel('login')">Login</button>
<button onclick="openPanel('create')">Create Account</button>

<!-- LOGIN -->

<div id="login" class="panel">

<button onclick="closePanel('login')">Close</button>

<h2>Login</h2>

<input id="cardInput" placeholder="Card Number"><br>

<button onclick="startCamera()">Start Scanner</button>

<div class="scanBox">

<video id="camera" autoplay></video>

<div class="scanLine"></div>

</div>

<div class="reading">
Scanner Reading : <span id="scanResult">---</span>
</div>

</div>

<!-- CREATE ACCOUNT -->

<div id="create" class="panel">

<button onclick="closePanel('create')">Close</button>

<h2>Create Account</h2>

<input id="cname" placeholder="Name"><br>
<input id="cjob" placeholder="Job"><br>
<input id="ccl" placeholder="CL"><br>
<input id="cnational" placeholder="National No"><br>
<input id="ccard" placeholder="Card No"><br>

<input id="cpattern" maxlength="8" placeholder="8 Digit Pattern Code"><br>

<button onclick="createAccount()">Create</button>

</div>

<!-- ACCOUNT -->

<div id="account" class="panel">

<button onclick="closePanel('account')">Close</button>

<h2>Account</h2>

<div class="card">

<p>Name : <span id="name"></span></p>
<p>Job : <span id="job"></span></p>
<p>CL : <span id="cl"></span></p>
<p>National : <span id="national"></span></p>
<p>Card : <span id="cardno"></span></p>
<p>Balance : <span id="balance"></span></p>

</div>

<h3>Transfer Money</h3>

<input id="toCard" placeholder="Receiver Card"><br>
<input id="amountInput" placeholder="Amount"><br>

<button onclick="transfer()">Send</button>

</div>

<!-- ADMIN -->

<div>

<h2>Admin</h2>

<input id="pin" placeholder="Admin PIN">
<button onclick="adminLogin()">Open</button>

</div>

<div id="admin" class="panel">

<button onclick="closePanel('admin')">Close</button>

<h2>Admin Panel</h2>

<div id="accounts"></div>

</div>

<script>

let video=document.getElementById("camera")
let scanText=document.getElementById("scanResult")
let current=null

if(!localStorage.accounts){

let data={}

data["0001"]={
name:"City Minister",
job:"Minister",
cl:"VIP",
national:"000000",
card:"0001",
balance:"Infinity",
pattern:"11111111"
}

localStorage.accounts=JSON.stringify(data)

}

function openPanel(id){
document.getElementById(id).style.display="block"
}

function closePanel(id){
document.getElementById(id).style.display="none"
}

function startCamera(){

navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
})

.then(stream=>{
video.srcObject=stream
scanLoop()
})

}

function scanLoop(){

setInterval(()=>{

let detected=mockScan()

scanText.innerText=detected

let card=document.getElementById("cardInput").value

let accounts=JSON.parse(localStorage.accounts)

if(accounts[card]){

if(accounts[card].pattern==detected){

login(card)

}

}

},400)

}

function mockScan(){

let result=""

for(let i=0;i<8;i++){

result+=Math.random()>0.5?"1":"0"

}

return result

}

function login(card){

let acc=JSON.parse(localStorage.accounts)[card]

current=card

openPanel("account")
closePanel("login")

name.innerText=acc.name
job.innerText=acc.job
cl.innerText=acc.cl
national.innerText=acc.national
cardno.innerText=acc.card
balance.innerText=acc.balance

}

function createAccount(){

if(cpattern.value.length!=8){
alert("Pattern must be exactly 8 digits")
return
}

let data=JSON.parse(localStorage.accounts)

let card=ccard.value

data[card]={

name:cname.value,
job:cjob.value,
cl:ccl.value,
national:cnational.value,
card:card,
balance:0,
pattern:cpattern.value

}

localStorage.accounts=JSON.stringify(data)

alert("Account Created")

}

function transfer(){

let to=toCard.value
let amount=parseInt(amountInput.value)

let data=JSON.parse(localStorage.accounts)

if(data[current].balance!="Infinity")
data[current].balance-=amount

if(data[to].balance!="Infinity")
data[to].balance+=amount

localStorage.accounts=JSON.stringify(data)

alert("Transfer Successful")

}

function adminLogin(){

if(pin.value=="303786303"){

openPanel("admin")

showAccounts()

}

}

function showAccounts(){

let data=JSON.parse(localStorage.accounts)

let html=""

for(let card in data){

let a=data[card]

html+=`

<div class="card">

Name:<input value="${a.name}" onchange="edit('${card}','name',this.value)"><br>
Job:<input value="${a.job}" onchange="edit('${card}','job',this.value)"><br>
CL:<input value="${a.cl}" onchange="edit('${card}','cl',this.value)"><br>
National:<input value="${a.national}" onchange="edit('${card}','national',this.value)"><br>
Card:<input value="${a.card}" onchange="edit('${card}','card',this.value)"><br>
Balance:<input value="${a.balance}" onchange="edit('${card}','balance',this.value)"><br>
Pattern:<input maxlength="8" value="${a.pattern}" onchange="edit('${card}','pattern',this.value)"><br>

</div>

`

}

accounts.innerHTML=html

}

function edit(card,key,val){

let data=JSON.parse(localStorage.accounts)

if(key=="pattern" && val.length!=8){
alert("Pattern must be 8 digits")
return
}

data[card][key]=val

localStorage.accounts=JSON.stringify(data)

}

</script>

</body>
</html>
