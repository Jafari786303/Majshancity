<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Banking System</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
text-align:center;
}

.card{
width:320px;
margin:auto;
background:linear-gradient(45deg,#111,#333);
border-radius:15px;
padding:20px;
box-shadow:0 0 20px cyan;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#00c6ff;
color:white;
font-weight:bold;
cursor:pointer;
}

input{
padding:8px;
margin:5px;
border-radius:8px;
border:none;
}

video{
width:300px;
border-radius:10px;
}

.panel{
display:none;
}

</style>
</head>

<body>

<h1>National Digital Bank</h1>

<div id="login">

<h2>Login</h2>

<input id="cardInput" placeholder="Enter Card Number"><br>

<button onclick="startCamera()">Start Scanner</button>

<br><br>

<video id="camera" autoplay></video>

</div>

<div id="account" class="panel">

<h2>Your Account</h2>

<div class="card">

<p>Name : <span id="name"></span></p>
<p>Job : <span id="job"></span></p>
<p>CL : <span id="cl"></span></p>
<p>National no : <span id="national"></span></p>
<p>Card no : <span id="cardno"></span></p>
<p>Balance : <span id="balance"></span></p>

</div>

<h3>Transfer Money</h3>

<input id="toCard" placeholder="Receiver Card"><br>
<input id="amount" placeholder="Amount"><br>

<button onclick="transfer()">Send</button>

</div>

<div id="create">

<h2>Create Account</h2>

<input id="cname" placeholder="Name"><br>
<input id="cjob" placeholder="Job"><br>
<input id="ccl" placeholder="CL"><br>
<input id="cnational" placeholder="National No"><br>
<input id="ccard" placeholder="Card No"><br>

<button onclick="createAccount()">Create</button>

</div>

<div>

<h2>Admin</h2>

<input id="pin" placeholder="Admin PIN">
<button onclick="adminLogin()">Open</button>

</div>

<div id="adminPanel" class="panel">

<h2>Admin Panel</h2>

<div id="accounts"></div>

</div>

<script>

let video=document.getElementById("camera")
let current=null

if(!localStorage.accounts){

let data={}

data["0001"]={
name:"City Minister",
job:"Minister",
cl:"VIP",
national:"000000",
card:"0001",
balance:"Infinity",
pattern:"111111"
}

localStorage.accounts=JSON.stringify(data)

}

function startCamera(){

navigator.mediaDevices.getUserMedia({video:true})

.then(stream=>{

video.srcObject=stream

scan()

})

}

function scan(){

setInterval(()=>{

let entered=document.getElementById("cardInput").value

let accounts=JSON.parse(localStorage.accounts)

if(accounts[entered]){

let pattern=accounts[entered].pattern

let detected=mockScan()

if(pattern==detected){

login(entered)

}

}

},500)

}

function mockScan(){

let patterns=["000","111","010","101"]

return patterns[Math.floor(Math.random()*patterns.length)]

}

function login(card){

let acc=JSON.parse(localStorage.accounts)[card]

current=card

document.getElementById("login").style.display="none"

document.getElementById("account").style.display="block"

document.getElementById("name").innerText=acc.name
document.getElementById("job").innerText=acc.job
document.getElementById("cl").innerText=acc.cl
document.getElementById("national").innerText=acc.national
document.getElementById("cardno").innerText=acc.card
document.getElementById("balance").innerText=acc.balance

}

function transfer(){

let to=document.getElementById("toCard").value
let amount=parseInt(document.getElementById("amount").value)

let accounts=JSON.parse(localStorage.accounts)

if(accounts[current].balance!="Infinity")
accounts[current].balance-=amount

if(accounts[to].balance!="Infinity")
accounts[to].balance+=amount

localStorage.accounts=JSON.stringify(accounts)

alert("Transfer Successful")

}

function createAccount(){

let data=JSON.parse(localStorage.accounts)

let card=document.getElementById("ccard").value

data[card]={

name:document.getElementById("cname").value,
job:document.getElementById("cjob").value,
cl:document.getElementById("ccl").value,
national:document.getElementById("cnational").value,
card:card,
balance:0,
pattern:"000"

}

localStorage.accounts=JSON.stringify(data)

alert("Account Created")

}

function adminLogin(){

let pin=document.getElementById("pin").value

if(pin=="303786303"){

document.getElementById("adminPanel").style.display="block"

showAccounts()

}

}

function showAccounts(){

let data=JSON.parse(localStorage.accounts)

let html=""

for(let card in data){

let a=data[card]

html+=`
<div class="card">

Name:<input value="${a.name}" onchange="edit('${card}','name',this.value)"><br>
Job:<input value="${a.job}" onchange="edit('${card}','job',this.value)"><br>
CL:<input value="${a.cl}" onchange="edit('${card}','cl',this.value)"><br>
National:<input value="${a.national}" onchange="edit('${card}','national',this.value)"><br>
Card:<input value="${a.card}" onchange="edit('${card}','card',this.value)"><br>
Balance:<input value="${a.balance}" onchange="edit('${card}','balance',this.value)"><br>

</div>
`

}

document.getElementById("accounts").innerHTML=html

}

function edit(card,key,val){

let data=JSON.parse(localStorage.accounts)

data[card][key]=val

localStorage.accounts=JSON.stringify(data)

}

</script>

</body>
</html>
