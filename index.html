<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Bank</title>

<style>
body{
 font-family:Arial;
 background:#0f172a;
 color:white;
 text-align:center;
 margin:0;
}

.container{
 padding:15px;
}

.card{
 background:#1e293b;
 padding:15px;
 margin:10px;
 border-radius:10px;
}

button{
 padding:10px 15px;
 margin:5px;
 border:none;
 border-radius:8px;
 background:#3b82f6;
 color:white;
 font-size:16px;
}

input{
 padding:10px;
 margin:5px;
 border-radius:8px;
 border:none;
 width:80%;
}

video{
 width:90%;
 border-radius:10px;
 margin-top:10px;
}
</style>

</head>

<body>

<div class="container">

<h2>Secure Banking System</h2>

<!-- CAMERA -->
<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<br>
<button onclick="startCam()">Start Camera</button>
<button onclick="scan()">Scan</button>

<p id="patternText">Pattern: </p>

<!-- LOGIN -->
<div class="card">
<h3>Login</h3>
<input type="password" id="patternInput" placeholder="Enter Pattern">
<br>
<button onclick="manualLogin()">Login</button>
</div>

<!-- ADMIN -->
<div class="card">
<h3>Admin</h3>
<input type="password" id="adminPass" placeholder="Admin Password">
<br>
<button onclick="adminLogin()">Open Admin</button>
<pre id="adminPanel"></pre>
</div>

</div>

<script>

let video=document.getElementById("video")
let history=[]
let last=""

// USERS
let users=[
{name:"Muhammad",pattern:"10100101",balance:5000},
{name:"Hassan",pattern:"11001100",balance:8000},
{name:"Hussain",pattern:"00110011",balance:12000}
]

// ADMIN PASSWORD
let adminPassword="mjgogog786"

// CAMERA START
function startCam(){
 navigator.mediaDevices.getUserMedia({
  video:{ facingMode:"environment" }
 })
 .then(stream=>{
  video.srcObject=stream
 })
 .catch(()=>{
  alert("Camera not allowed")
 })
}

// SCANNER (STABLE VERSION)
function scan(){
 if(video.videoWidth===0) return

 let canvas=document.getElementById("canvas")
 let ctx=canvas.getContext("2d")

 canvas.width=video.videoWidth
 canvas.height=video.videoHeight

 ctx.drawImage(video,0,0)

 let y=canvas.height/2
 let step=canvas.width/8

 let bits=""

 for(let i=0;i<8;i++){
  let x=i*step+step/2

  let blue=0
  let red=0

  for(let dx=-5;dx<=5;dx++){
   for(let dy=-5;dy<=5;dy++){

    let d=ctx.getImageData(x+dx,y+dy,1,1).data
    let r=d[0],g=d[1],b=d[2]

    if(r>150 && r>g+30 && r>b+30){
     red++
    }

    if(b>130 && b>r+20){
     blue++
    }

   }
  }

  bits += blue > red ? "1" : "0"
 }

 history.push(bits)
 if(history.length>3) history.shift()

 document.getElementById("patternText").innerText="Pattern: "+bits

 if(history.every(v=>v===bits) && bits!==last){
  login(bits)
  last=bits
 }
}

// LOGIN
function login(p){
 let user=users.find(u=>u.pattern===p)

 if(user){
  alert("Welcome "+user.name)
 }else{
  alert("Access Denied")
 }
}

// MANUAL LOGIN
function manualLogin(){
 let p=document.getElementById("patternInput").value
 login(p)
}

// ADMIN
function adminLogin(){
 let pass=document.getElementById("adminPass").value

 if(pass===adminPassword){
  let txt="ADMIN PANEL\n\n"

  users.forEach(u=>{
   txt+=`Name: ${u.name}\nPattern: ${u.pattern}\nBalance: ${u.balance}\n\n`
  })

  document.getElementById("adminPanel").innerText=txt
 }else{
  alert("Wrong password")
 }
}

</script>

</body>
</html>
