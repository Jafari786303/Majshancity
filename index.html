<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Banking + Admin</title>

<style>
body{
 margin:0;
 font-family:Arial;
 background:#0f172a;
 color:white;
 text-align:center;
}

.container{ padding:15px; }

.card{
 background:#1e293b;
 padding:15px;
 margin:10px;
 border-radius:10px;
}

input, select{
 padding:8px;
 margin:5px;
 width:80%;
 border-radius:6px;
 border:none;
}

button{
 padding:10px;
 margin:5px;
 border:none;
 border-radius:8px;
 background:#3b82f6;
 color:white;
}

.hidden{ display:none; }

table{
 width:100%;
 border-collapse:collapse;
}

td,th{
 border:1px solid #444;
 padding:5px;
 font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<h2>Secure Banking System</h2>

<button onclick="showAdmin()">Admin Panel</button>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="card hidden">

<h3>Admin Panel</h3>

<input id="name" placeholder="Name">
<input id="job" placeholder="Job">
<input id="cnic" placeholder="National ID (CNIC)">
<input id="card" placeholder="Card No">
<input id="pattern" placeholder="Pattern">
<input id="pin" placeholder="PIN">
<input id="balance" placeholder="Balance">

<br>
<button onclick="addUser()">Add / Update User</button>

<h3>User List</h3>

<table id="userTable"></table>

<button onclick="closeAdmin()">Close</button>

</div>

<!-- LOGIN -->
<div id="loginArea" class="card">

<h3>User Login</h3>

<input id="loginName" placeholder="Enter Name">
<button onclick="login()">Login</button>

</div>

<!-- USER DASHBOARD -->
<div id="dashboard" class="hidden">

<h3 id="userName"></h3>

<div class="card">
<p id="job"></p>
<p id="cnic"></p>
<p id="cardNo"></p>
<p id="balanceText"></p>
</div>

<button onclick="logout()">Logout</button>

</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || [];

let currentUser=null;

// ADMIN PANEL
function showAdmin(){
 document.getElementById("adminPanel").classList.remove("hidden");
 renderTable();
}

function closeAdmin(){
 document.getElementById("adminPanel").classList.add("hidden");
}

function addUser(){

 let user={
  name:document.getElementById("name").value,
  job:document.getElementById("job").value,
  cnic:document.getElementById("cnic").value,
  card:document.getElementById("card").value,
  pattern:document.getElementById("pattern").value,
  pin:document.getElementById("pin").value,
  balance:parseFloat(document.getElementById("balance").value)
 };

 let existing=users.find(u=>u.name===user.name);

 if(existing){
  Object.assign(existing,user);
 }else{
  users.push(user);
 }

 localStorage.setItem("users",JSON.stringify(users));

 renderTable();
 alert("Saved");
}

function renderTable(){

 let table=document.getElementById("userTable");
 table.innerHTML="<tr><th>Name</th><th>Job</th><th>CNIC</th><th>Card</th><th>Balance</th></tr>";

 users.forEach(u=>{
  table.innerHTML+=`
   <tr>
    <td>${u.name}</td>
    <td>${u.job}</td>
    <td>${u.cnic}</td>
    <td>${u.card}</td>
    <td>${u.balance}</td>
   </tr>`;
 });
}

// LOGIN
function login(){

 let name=document.getElementById("loginName").value;

 let user=users.find(u=>u.name===name);

 if(user){

  currentUser=user;

  document.getElementById("loginArea").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");

  document.getElementById("userName").innerText=user.name;
  document.getElementById("job").innerText="Job: "+user.job;
  document.getElementById("cnic").innerText="CNIC: "+user.cnic;
  document.getElementById("cardNo").innerText="Card: "+user.card;
  document.getElementById("balanceText").innerText="Balance: "+user.balance;

 }else alert("User not found");
}

// LOGOUT
function logout(){
 currentUser=null;

 document.getElementById("dashboard").classList.add("hidden");
 document.getElementById("loginArea").classList.remove("hidden");
}

</script>

</body>
</html>
